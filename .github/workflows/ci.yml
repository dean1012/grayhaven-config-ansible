name: CI

"on":
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca  # master
        with:
          version: v0.11.0
          additional_files: files/grayhaven-ansible-runner

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Ansible validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core ansible-lint

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r galaxy_requirements.yml

      - name: Run Ansible syntax check
        run: |
          find playbooks -type f \( -name "*.yml" -o -name "*.yaml" \) -print0 \
          | xargs -0 -n1 ansible-playbook -i localhost, --connection=local --syntax-check

      - name: Run ansible-lint
        run: ansible-lint .
