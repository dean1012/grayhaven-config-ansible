name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca  # master
        with:
          version: v0.11.0
          additional_files: files/grayhaven-ansible-runner

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install Ansible validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core ansible-lint

      - name: Install Ansible Galaxy collections
        run: ansible-galaxy collection install -r galaxy_requirements.yml

      - name: Run Ansible syntax check
        run: |
          find playbooks -type f \( -name "*.yml" -o -name "*.yaml" \) -print0 \
          | xargs -0 -n1 ansible-playbook -i localhost, --connection=local --syntax-check

      - name: Run ansible-lint
        run: ansible-lint .
