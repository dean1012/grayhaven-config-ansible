name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca  # master
        with:
          version: v0.11.0
          additional_files: files/grayhaven-ansible-runner files/grayhaven-ansible-poller roles/admin_access/files/gtmux

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Run Python syntax checks
        run: >-
          python -m py_compile
          files/grayhaven-gcs-restic-bucket-cleanup
          files/grayhaven-reboot-notify
          files/grayhaven-refresh-motd
          roles/observability/files/grayhaven-grafana-alert-sync
          roles/observability/files/grayhaven-observability-textfile
          scripts/validate-rendered-alloy-config

      - name: Install Alloy validation tool
        run: |
          sudo apt-get update
          sudo apt-get install --yes apt-transport-https gpg wget
          sudo mkdir -p /etc/apt/keyrings
          sudo wget -O /etc/apt/keyrings/grafana.asc https://apt.grafana.com/gpg-full.key
          sudo chmod 644 /etc/apt/keyrings/grafana.asc
          echo "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main" \
          | sudo tee /etc/apt/sources.list.d/grafana.list
          sudo apt-get update
          sudo apt-get install --yes alloy

      - name: Install Ansible validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes --requirement pip3_requirements.txt
          python -m pip install ansible-lint

      - name: Validate rendered Alloy config
        run: scripts/validate-rendered-alloy-config

      - name: Install Ansible Galaxy collections
        run: scripts/install-galaxy-collections

      - name: Run Ansible syntax check
        run: |
          find playbooks -type f \( -name "*.yml" -o -name "*.yaml" \) -print0 \
          | xargs -0 -n1 ansible-playbook -i localhost, --connection=local --syntax-check

      - name: Run ansible-lint
        run: ansible-lint .
