---
- name: Ensure local backup directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop:
    - "{{ restic_backup_repository_path }}"
    - "{{ restic_backup_homedir_archive_path }}"
    - /etc/grayhaven/backup
    - /var/cache/restic

- name: Store restic password file
  ansible.builtin.copy:
    dest: /etc/grayhaven/backup/restic-password
    owner: root
    group: root
    mode: "0600"
    content: "{{ restic_backup_password }}"
  no_log: true

- name: Store GCS restic credential file
  ansible.builtin.copy:
    dest: /etc/grayhaven/backup/gcs-credentials.json
    owner: root
    group: root
    mode: "0600"
    content: "{{ restic_backup_remote_gcs_credentials_json }}"
  when: restic_backup_remote_gcs_enabled | bool
  no_log: true

- name: Store restic include list
  ansible.builtin.copy:
    dest: /etc/grayhaven/backup/include
    owner: root
    group: root
    mode: "0644"
    content: "{{ restic_backup_include_paths | join('\n') }}\n"

- name: Store restic exclude list
  ansible.builtin.copy:
    dest: /etc/grayhaven/backup/exclude
    owner: root
    group: root
    mode: "0644"
    content: "{{ restic_backup_exclude_paths | join('\n') }}\n"

- name: Initialize local restic repository
  ansible.builtin.command:
    cmd: >-
      restic
      --repo {{ restic_backup_repository_path | quote }}
      --password-file /etc/grayhaven/backup/restic-password
      init
    creates: "{{ restic_backup_repository_path }}/config"
  no_log: true

- name: Initialize remote GCS restic repository
  ansible.builtin.shell: |
    set -Eeuo pipefail
    if ! restic \
        --repo "$REMOTE_REPOSITORY" \
        --password-file "$PASSWORD_FILE" \
        cat config >/dev/null 2>&1; then
      restic \
        --repo "$REMOTE_REPOSITORY" \
        --password-file "$PASSWORD_FILE" \
        init
    fi
  args:
    executable: /usr/bin/bash
  environment:
    GOOGLE_PROJECT_ID: "{{ restic_backup_remote_gcs_project_id }}"
    GOOGLE_APPLICATION_CREDENTIALS: /etc/grayhaven/backup/gcs-credentials.json
    REMOTE_REPOSITORY: "{{ restic_backup_remote_gcs_repository }}"
    PASSWORD_FILE: /etc/grayhaven/backup/restic-password
  register: restic_backup_remote_init
  changed_when: >-
    'created restic repository' in
    (
      restic_backup_remote_init.stdout
      ~ restic_backup_remote_init.stderr
    )
  when: restic_backup_remote_gcs_enabled | bool
  no_log: true

- name: Install local restic backup script
  ansible.builtin.copy:
    dest: /usr/local/sbin/grayhaven-restic-backup
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -Eeuo pipefail

      LOCAL_REPOSITORY={{ restic_backup_repository_path | quote }}
      REMOTE_ENABLED={{ 'true' if restic_backup_remote_gcs_enabled else 'false' }}
      REMOTE_REPOSITORY={{ restic_backup_remote_gcs_repository | default('') | quote }}
      PASSWORD_FILE=/etc/grayhaven/backup/restic-password
      INCLUDE_FILE=/etc/grayhaven/backup/include
      EXCLUDE_FILE=/etc/grayhaven/backup/exclude
      KEEP_DAILY={{ restic_backup_keep_daily | quote }}
      TEXTFILE_DIR=/var/lib/grayhaven/observability/textfile
      RESTIC_CACHE_DIR=/var/cache/restic
      GCS_CREDENTIALS_FILE=/etc/grayhaven/backup/gcs-credentials.json
      GCS_PROJECT_ID={{ restic_backup_remote_gcs_project_id | default('') | quote }}

      export RESTIC_CACHE_DIR

      successful_repositories=()
      declare -A repository_backup_duration_seconds
      declare -A repository_restore_size_bytes
      declare -A repository_snapshot_count

      backup_repository() {
        local repository=$1
        local label=$2
        local backup_start
        local backup_end

        backup_start="$(date +%s)"

        restic \
          --repo "$repository" \
          --password-file "$PASSWORD_FILE" \
          backup \
          --files-from "$INCLUDE_FILE" \
          --exclude-file "$EXCLUDE_FILE" \
          --tag "grayhaven-${label}" \
          --host "$(hostname -f)"

        restic \
          --repo "$repository" \
          --password-file "$PASSWORD_FILE" \
          forget \
          --keep-daily "$KEEP_DAILY" \
          --prune

        backup_end="$(date +%s)"
        repository_backup_duration_seconds["$label"]=$((backup_end - backup_start))
        repository_restore_size_bytes["$label"]="$(
          restic \
            --repo "$repository" \
            --password-file "$PASSWORD_FILE" \
            stats latest \
            --mode restore-size \
            --json \
            | python3 -c 'import json, sys; print(int(json.load(sys.stdin).get("total_size", 0)))'
        )"
        repository_snapshot_count["$label"]="$(
          restic \
            --repo "$repository" \
            --password-file "$PASSWORD_FILE" \
            snapshots \
            --json \
            | python3 -c 'import json, sys; print(len(json.load(sys.stdin)))'
        )"
        successful_repositories+=("$label")
      }

      backup_repository "$LOCAL_REPOSITORY" local

      if [[ "$REMOTE_ENABLED" == "true" ]]; then
        export GOOGLE_PROJECT_ID="$GCS_PROJECT_ID"
        export GOOGLE_APPLICATION_CREDENTIALS="$GCS_CREDENTIALS_FILE"
        backup_repository "$REMOTE_REPOSITORY" remote
      fi

      if [[ -d "$TEXTFILE_DIR" ]]; then
        tmp_file="$(mktemp "${TEXTFILE_DIR}/restic.XXXXXX")"
        backup_timestamp="$(date +%s)"
        {
          printf '# HELP grayhaven_restic_backup_last_success_timestamp_seconds Last successful backup time.\n'
          printf '# TYPE grayhaven_restic_backup_last_success_timestamp_seconds gauge\n'
          printf 'grayhaven_restic_backup_last_success_timestamp_seconds{host="%s"} %s\n' \
            "$(hostname -f)" \
            "$backup_timestamp"
          printf '# HELP grayhaven_restic_repository_last_success_timestamp_seconds Last restic backup by repository.\n'
          printf '# TYPE grayhaven_restic_repository_last_success_timestamp_seconds gauge\n'
          for repository_label in "${successful_repositories[@]}"; do
            printf 'grayhaven_restic_repository_last_success_timestamp_seconds{host="%s",repository="%s"} %s\n' \
              "$(hostname -f)" \
              "$repository_label" \
              "$backup_timestamp"
          done
          printf '# HELP grayhaven_restic_repository_backup_duration_seconds Last backup duration by repository.\n'
          printf '# TYPE grayhaven_restic_repository_backup_duration_seconds gauge\n'
          for repository_label in "${successful_repositories[@]}"; do
            printf 'grayhaven_restic_repository_backup_duration_seconds{host="%s",repository="%s"} %s\n' \
              "$(hostname -f)" \
              "$repository_label" \
              "${repository_backup_duration_seconds[$repository_label]}"
          done
          printf '# HELP grayhaven_restic_repository_restore_size_bytes Latest restore-size bytes by repository.\n'
          printf '# TYPE grayhaven_restic_repository_restore_size_bytes gauge\n'
          for repository_label in "${successful_repositories[@]}"; do
            printf 'grayhaven_restic_repository_restore_size_bytes{host="%s",repository="%s"} %s\n' \
              "$(hostname -f)" \
              "$repository_label" \
              "${repository_restore_size_bytes[$repository_label]}"
          done
          printf '# HELP grayhaven_restic_repository_snapshot_count Restic snapshot count by repository.\n'
          printf '# TYPE grayhaven_restic_repository_snapshot_count gauge\n'
          for repository_label in "${successful_repositories[@]}"; do
            printf 'grayhaven_restic_repository_snapshot_count{host="%s",repository="%s"} %s\n' \
              "$(hostname -f)" \
              "$repository_label" \
              "${repository_snapshot_count[$repository_label]}"
          done
        } > "$tmp_file"
        chmod 0644 "$tmp_file"
        mv "$tmp_file" "${TEXTFILE_DIR}/restic.prom"
      fi

- name: Install local restic backup service
  ansible.builtin.copy:
    dest: /etc/systemd/system/grayhaven-restic-backup.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Grayhaven Systems LLC local restic backup
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/grayhaven-restic-backup

- name: Install restic integrity check script
  ansible.builtin.copy:
    dest: /usr/local/sbin/grayhaven-restic-check
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -Eeuo pipefail

      LOCAL_REPOSITORY={{ restic_backup_repository_path | quote }}
      REMOTE_ENABLED={{ 'true' if restic_backup_remote_gcs_enabled else 'false' }}
      REMOTE_REPOSITORY={{ restic_backup_remote_gcs_repository | default('') | quote }}
      PASSWORD_FILE=/etc/grayhaven/backup/restic-password
      RESTIC_CACHE_DIR=/var/cache/restic
      TEXTFILE_DIR=/var/lib/grayhaven/observability/textfile
      GCS_CREDENTIALS_FILE=/etc/grayhaven/backup/gcs-credentials.json
      GCS_PROJECT_ID={{ restic_backup_remote_gcs_project_id | default('') | quote }}

      export RESTIC_CACHE_DIR

      successful_repositories=()
      declare -A repository_check_duration_seconds

      check_repository() {
        local repository=$1
        local label=$2
        local check_start
        local check_end

        check_start="$(date +%s)"

        restic \
          --repo "$repository" \
          --password-file "$PASSWORD_FILE" \
          check \
          --read-data-subset=5%

        check_end="$(date +%s)"
        repository_check_duration_seconds["$label"]=$((check_end - check_start))
        successful_repositories+=("$label")
      }

      check_repository "$LOCAL_REPOSITORY" local

      if [[ "$REMOTE_ENABLED" == "true" ]]; then
        export GOOGLE_PROJECT_ID="$GCS_PROJECT_ID"
        export GOOGLE_APPLICATION_CREDENTIALS="$GCS_CREDENTIALS_FILE"
        check_repository "$REMOTE_REPOSITORY" remote
      fi

      if [[ -d "$TEXTFILE_DIR" ]]; then
        tmp_file="$(mktemp "${TEXTFILE_DIR}/restic-check.XXXXXX")"
        check_timestamp="$(date +%s)"
        {
          printf '# HELP grayhaven_restic_repository_check_last_success_timestamp_seconds Last check by repository.\n'
          printf '# TYPE grayhaven_restic_repository_check_last_success_timestamp_seconds gauge\n'
          for repository_label in "${successful_repositories[@]}"; do
            printf 'grayhaven_restic_repository_check_last_success_timestamp_seconds{host="%s",repository="%s"} %s\n' \
              "$(hostname -f)" \
              "$repository_label" \
              "$check_timestamp"
          done
          printf '# HELP grayhaven_restic_repository_check_duration_seconds Last check duration by repository.\n'
          printf '# TYPE grayhaven_restic_repository_check_duration_seconds gauge\n'
          for repository_label in "${successful_repositories[@]}"; do
            printf 'grayhaven_restic_repository_check_duration_seconds{host="%s",repository="%s"} %s\n' \
              "$(hostname -f)" \
              "$repository_label" \
              "${repository_check_duration_seconds[$repository_label]}"
          done
        } > "$tmp_file"
        chmod 0644 "$tmp_file"
        mv "$tmp_file" "${TEXTFILE_DIR}/restic-check.prom"
      fi

- name: Install restic integrity check service
  ansible.builtin.copy:
    dest: /etc/systemd/system/grayhaven-restic-check.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Grayhaven Systems LLC restic integrity check
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/grayhaven-restic-check

- name: Install restic integrity check timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/grayhaven-restic-check.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Run Grayhaven Systems LLC restic integrity check weekly

      [Timer]
      OnCalendar=Sun *-*-* 03:37:00
      RandomizedDelaySec=30m
      Persistent=true
      Unit=grayhaven-restic-check.service

      [Install]
      WantedBy=timers.target

- name: Enable restic integrity check timer
  ansible.builtin.systemd_service:
    name: grayhaven-restic-check.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Install local restic backup timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/grayhaven-restic-backup.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Run Grayhaven Systems LLC local restic backup daily

      [Timer]
      OnCalendar=*-*-* 02:37:00
      RandomizedDelaySec=15m
      Persistent=true
      Unit=grayhaven-restic-backup.service

      [Install]
      WantedBy=timers.target

- name: Enable local restic backup timer
  ansible.builtin.systemd_service:
    name: grayhaven-restic-backup.timer
    enabled: true
    state: started
    daemon_reload: true
