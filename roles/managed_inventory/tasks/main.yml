---
- name: Validate managed inventory variables
  ansible.builtin.assert:
    that:
      - managed_inventory_fallback_vpc_cidr is string
      - managed_inventory_fallback_vpc_cidr | trim | length > 0
      - >-
        managed_inventory_fallback_vpc_cidr
        is match('^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$')
    fail_msg: "network.vpc_cidr must be provided as a valid IPv4 CIDR block."
    quiet: true

- name: Build managed host metadata from inventory
  ansible.builtin.set_fact:
    managed_inventory_hosts: "{{ managed_inventory_hosts | default([]) + [managed_inventory_host_entry] }}"
  vars:
    managed_inventory_host_role: >-
      {{
        'bastion'
        if 'role-bastion' in (hostvars[item].do_tags | default([]))
        else 'web'
        if 'role-web' in (hostvars[item].do_tags | default([]))
        else 'unknown'
      }}
    managed_inventory_host_private_ip: >-
      {{
        hostvars[item].grayhaven_private_ipv4
        | default(
            hostvars[item].networks.v4
            | default([])
            | selectattr('type', 'eq', 'private')
            | map(attribute='ip_address')
            | first
          )
      }}
    managed_inventory_host_entry:
      inventory_name: "{{ item }}"
      fqdn: "{{ hostvars[item].inventory_hostname | default(item) }}"
      private_ip: "{{ managed_inventory_host_private_ip }}"
      role: "{{ managed_inventory_host_role }}"
      host_alias: "{{ (hostvars[item].inventory_hostname | default(item)).split('.')[0] }}"
  loop: "{{ ansible_play_hosts_all }}"
  when: managed_inventory_host_role != "unknown"

- name: Derive bastion private source addresses
  ansible.builtin.set_fact:
    managed_inventory_bastion_private_sources: >-
      {{
        managed_inventory_hosts
        | default([])
        | selectattr('role', 'equalto', 'bastion')
        | map(attribute='private_ip')
        | select('defined')
        | select('string')
        | list
      }}

- name: Derive web private source addresses
  ansible.builtin.set_fact:
    managed_inventory_web_private_sources: >-
      {{
        managed_inventory_hosts
        | default([])
        | selectattr('role', 'equalto', 'web')
        | map(attribute='private_ip')
        | select('defined')
        | select('string')
        | list
      }}

- name: Build web SSH source list for control-node failover
  ansible.builtin.set_fact:
    managed_inventory_web_ssh_sources: >-
      {{
        (
          [managed_inventory_fallback_vpc_cidr]
          + managed_inventory_bastion_private_sources
        )
        | unique
      }}
