---
observability_alloy_package: alloy
observability_alloy_repo_name: grafana
observability_alloy_repo_baseurl: https://rpm.grafana.com
observability_alloy_repo_gpgkey: https://rpm.grafana.com/gpg.key

observability_config_dir: /etc/grayhaven/observability
observability_alloy_token_file: "{{ observability_config_dir }}/grafana-alloy-token"
observability_alert_sync_config_file: "{{ observability_config_dir }}/grafana-alert-sync.json"
observability_alert_initial_silence_marker_file: "{{ observability_config_dir }}/initial-alert-silence-created"
observability_textfile_config_file: "{{ observability_config_dir }}/textfile-metrics.json"
observability_textfile_dir: /var/lib/grayhaven/observability/textfile
observability_alloy_http_url: http://127.0.0.1:12345
observability_alloy_ready_retries: 30
observability_alloy_ready_delay: 2
observability_alloy_remote_write_retries: 60
observability_alloy_remote_write_delay: 5
observability_alert_initial_silence_minutes: 15

observability_grafana_default_folder: Grayhaven Systems LLC
observability_grafana_default_evaluation_group: grayhaven-production-1m
observability_grafana_default_contact_point: Grafana IRM
observability_grafana_default_evaluation_interval: 1m

observability_cpu_warning_percent: 80
observability_memory_warning_percent: 80
observability_filesystem_warning_percent: 80
observability_filesystem_inode_warning_percent: 80
observability_swap_warning_percent: 80
observability_restic_stale_seconds: 129600

observability_service_units_common:
  - name: sshd.service
    check: sshd_service
    summary: SSH service is down
  - name: firewalld.service
    check: firewalld_service
    summary: firewalld service is down
  - name: fail2ban.service
    check: fail2ban_service
    summary: fail2ban service is down
  - name: grayhaven-restic-backup.timer
    check: restic_timer
    summary: Restic backup timer is down
  - name: grayhaven-restic-check.timer
    check: restic_check_timer
    summary: Restic integrity check timer is down

observability_service_units_web:
  - name: nginx.service
    check: nginx_service
    summary: Nginx service is down

observability_service_units_control_node:
  - name: grayhaven-ansible-runner.timer
    check: ansible_runner_timer
    summary: Ansible runner timer is down
  - name: grayhaven-ansible-poller.timer
    check: ansible_poller_timer
    summary: Ansible poller timer is down
