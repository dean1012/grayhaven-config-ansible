---
- name: Gather service facts for optional Alloy cleanup
  ansible.builtin.service_facts:

- name: Stop Alloy when Grafana Cloud metrics are disabled
  ansible.builtin.systemd_service:
    name: alloy.service
    enabled: false
    state: stopped
  when:
    - not observability_metrics_enabled
    - "'alloy.service' in ansible_facts.services"

- name: Trust Grafana RPM signing key
  ansible.builtin.rpm_key:
    key: "{{ observability_alloy_repo_gpgkey }}"
    state: present
  when: observability_metrics_enabled

- name: Configure Grafana DNF repository
  ansible.builtin.yum_repository:
    name: "{{ observability_alloy_repo_name }}"
    description: Grafana stable packages
    baseurl: "{{ observability_alloy_repo_baseurl }}"
    enabled: true
    gpgcheck: true
    repo_gpgcheck: true
    gpgkey: "{{ observability_alloy_repo_gpgkey }}"
    sslverify: true
    sslcacert: /etc/pki/tls/certs/ca-bundle.crt
  when: observability_metrics_enabled

- name: Install Grafana Alloy
  ansible.builtin.dnf:
    name: "{{ observability_alloy_package }}"
    state: present
  when: observability_metrics_enabled

- name: Configure Grafana Alloy service defaults
  ansible.builtin.copy:
    dest: /etc/sysconfig/alloy
    owner: root
    group: root
    mode: "0644"
    content: |
      CONFIG_FILE="/etc/alloy/config.alloy"
      CUSTOM_ARGS=""
      RESTART_ON_UPGRADE=true
  when: observability_metrics_enabled
  notify: Restart Alloy

- name: Ensure observability directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ observability_config_dir }}"
      group: alloy
      mode: "0750"
    - path: /var/lib/grayhaven/observability
      owner: ansible
      group: alloy
      mode: "0755"
    - path: "{{ observability_textfile_dir }}"
      owner: ansible
      group: alloy
      mode: "0755"
  when: observability_metrics_enabled

- name: Allow Alloy to read managed log sources
  ansible.builtin.user:
    name: alloy
    groups:
      - adm
      - systemd-journal
    append: true
  when:
    - observability_metrics_enabled
    - observability_logs_enabled
  notify: Restart Alloy

- name: Keep auditd log files in the Alloy group
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^log_group\s*='
    line: log_group = alloy
    owner: root
    group: root
    mode: "0640"
  register: observability_auditd_log_group
  when:
    - observability_metrics_enabled
    - observability_logs_enabled

- name: Reload auditd after log group changes
  ansible.builtin.command:
    cmd: /usr/bin/systemctl kill -s HUP auditd.service
  changed_when: false
  when:
    - observability_metrics_enabled
    - observability_logs_enabled
    - observability_auditd_log_group is changed

- name: Allow Alloy group to traverse audit log directory
  ansible.builtin.file:
    path: /var/log/audit
    state: directory
    owner: root
    group: alloy
    mode: "0750"
  when:
    - observability_metrics_enabled
    - observability_logs_enabled
  notify: Restart Alloy

- name: Find existing audit log files for Alloy access
  ansible.builtin.find:
    paths: /var/log/audit
    patterns: "audit.log*"
    file_type: file
  register: observability_audit_log_files
  when:
    - observability_metrics_enabled
    - observability_logs_enabled

- name: Allow Alloy to read existing audit log files
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: alloy
    mode: "0640"
  loop: "{{ observability_audit_log_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - observability_metrics_enabled
    - observability_logs_enabled
  notify: Restart Alloy

- name: Store Grafana Alloy API key
  ansible.builtin.copy:
    dest: "{{ observability_alloy_token_file }}"
    owner: root
    group: alloy
    mode: "0640"
    content: "{{ observability_grafana_credentials.alloy_api_key }}"
  when: observability_metrics_enabled
  notify: Restart Alloy
  no_log: true

- name: Install Grayhaven observability textfile helper
  ansible.builtin.copy:
    src: grayhaven-observability-textfile
    dest: /usr/local/sbin/grayhaven-observability-textfile
    owner: root
    group: root
    mode: "0755"
  when: observability_metrics_enabled

- name: Store Grayhaven textfile metric configuration
  ansible.builtin.copy:
    dest: "{{ observability_textfile_config_file }}"
    owner: root
    group: root
    mode: "0644"
    content: "{{ observability_textfile_config | to_nice_json }}\n"
  vars:
    observability_textfile_config:
      host:
        fqdn: "{{ inventory_hostname }}"
        short_hostname: "{{ observability_short_hostname }}"
        role: "{{ observability_role }}"
        project: "{{ observability_project }}"
        client: "{{ observability_client }}"
        environment: "{{ grayhaven_environment }}"
        control_node: "{{ observability_host_is_control_node }}"
      hosts: "{{ observability_hosts }}"
  when: observability_metrics_enabled

- name: Install Grafana IRM alert-group textfile helper
  ansible.builtin.copy:
    src: grayhaven-irm-alert-groups-textfile
    dest: /usr/local/sbin/grayhaven-irm-alert-groups-textfile
    owner: root
    group: root
    mode: "0755"
  when:
    - observability_metrics_enabled
    - observability_host_is_control_node

- name: Store Grafana IRM alert-group reporting configuration
  ansible.builtin.copy:
    dest: "{{ observability_irm_alert_groups_config_file }}"
    owner: root
    group: root
    mode: "0600"
    content: "{{ observability_irm_alert_groups_config | to_nice_json }}\n"
  vars:
    observability_irm_alert_groups_config:
      grafana:
        stack_url: "{{ observability_grafana_credentials.stack_url }}"
        api_token: "{{ observability_grafana_credentials.irm_alert_groups.api_token }}"
      labels:
        client: "{{ observability_client }}"
        environment: "{{ grayhaven_environment }}"
      output_path: "{{ observability_textfile_dir }}/irm-alert-groups.prom"
  when:
    - observability_metrics_enabled
    - observability_host_is_control_node
  no_log: true

- name: Install Grayhaven observability textfile service
  ansible.builtin.copy:
    dest: /etc/systemd/system/grayhaven-observability-textfile.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Grayhaven Systems LLC observability textfile metrics

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/grayhaven-observability-textfile
  when: observability_metrics_enabled
  notify: Reload systemd

- name: Install Grafana IRM alert-group textfile service
  ansible.builtin.copy:
    dest: /etc/systemd/system/grayhaven-irm-alert-groups-textfile.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Grayhaven Systems LLC Grafana IRM alert-group textfile metrics

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/grayhaven-irm-alert-groups-textfile
  when:
    - observability_metrics_enabled
    - observability_host_is_control_node
  notify: Reload systemd

- name: Install Grafana IRM alert-group textfile timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/grayhaven-irm-alert-groups-textfile.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Refresh Grayhaven Systems LLC Grafana IRM alert-group textfile metrics

      [Timer]
      OnBootSec=1m
      OnUnitActiveSec=1m
      AccuracySec=15s
      Persistent=true
      Unit=grayhaven-irm-alert-groups-textfile.service

      [Install]
      WantedBy=timers.target
  when:
    - observability_metrics_enabled
    - observability_host_is_control_node
  notify: Reload systemd

- name: Install Grayhaven observability textfile timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/grayhaven-observability-textfile.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Refresh Grayhaven Systems LLC observability textfile metrics

      [Timer]
      OnBootSec=1m
      OnUnitActiveSec=1m
      AccuracySec=15s
      Persistent=true
      Unit=grayhaven-observability-textfile.service

      [Install]
      WantedBy=timers.target
  when: observability_metrics_enabled
  notify: Reload systemd

- name: Seed restic success metric during observability rollout
  ansible.builtin.copy:
    dest: "{{ observability_textfile_dir }}/restic.prom"
    owner: root
    group: root
    mode: "0644"
    force: false
    content: "{{ observability_restic_seed_metric }}"
  when: observability_metrics_enabled
  vars:
    observability_now_epoch: "{{ ansible_facts['date_time']['epoch'] }}"
    observability_restic_seed_metric_line: >-
      grayhaven_restic_backup_last_success_timestamp_seconds{host="{{ inventory_hostname }}"}
      {{ observability_now_epoch }}
    observability_restic_seed_metric: |
      # HELP grayhaven_restic_backup_last_success_timestamp_seconds Last successful backup time.
      # TYPE grayhaven_restic_backup_last_success_timestamp_seconds gauge
      {{ observability_restic_seed_metric_line }}

- name: Enable Grayhaven observability textfile timer
  ansible.builtin.systemd_service:
    name: grayhaven-observability-textfile.timer
    enabled: true
    state: started
    daemon_reload: true
  when: observability_metrics_enabled

- name: Enable Grafana IRM alert-group textfile timer
  ansible.builtin.systemd_service:
    name: grayhaven-irm-alert-groups-textfile.timer
    enabled: true
    state: started
    daemon_reload: true
  when:
    - observability_metrics_enabled
    - observability_host_is_control_node

- name: Render Grafana Alloy configuration
  ansible.builtin.template:
    src: config.alloy.j2
    dest: /etc/alloy/config.alloy
    owner: root
    group: alloy
    mode: "0640"
  when: observability_metrics_enabled
  notify: Restart Alloy

- name: Enable Grafana Alloy
  ansible.builtin.systemd_service:
    name: alloy.service
    enabled: true
    state: started
    daemon_reload: true
  when: observability_metrics_enabled

- name: Apply pending Alloy configuration changes before alert sync
  ansible.builtin.meta: flush_handlers
  when: observability_metrics_enabled

- name: Wait for Grafana Alloy readiness
  ansible.builtin.uri:
    url: "{{ observability_alloy_http_url }}/-/ready"
    return_content: true
  register: observability_alloy_ready
  retries: "{{ observability_alloy_ready_retries }}"
  delay: "{{ observability_alloy_ready_delay }}"
  until:
    - observability_alloy_ready.status == 200
    - "'Alloy is ready' in observability_alloy_ready.content"
  changed_when: false
  when: observability_metrics_enabled

- name: Wait for Grafana Alloy remote-write success
  ansible.builtin.uri:
    url: "{{ observability_alloy_http_url }}/metrics"
    return_content: true
  register: observability_alloy_metrics
  retries: "{{ observability_alloy_remote_write_retries }}"
  delay: "{{ observability_alloy_remote_write_delay }}"
  until: >-
    observability_alloy_metrics.content is
    regex('(?m)^prometheus_remote_storage_bytes_total\\{[^}]*component_id="prometheus\\.remote_write\\.grafana"[^}]*\\}\\s+(?!(?:0+(?:\\.0*)?(?:[eE][+-]?0+)?$))(?:[0-9]+(?:\\.[0-9]+)?|\\.[0-9]+)(?:[eE][+-]?[0-9]+)?$')
  changed_when: false
  no_log: true
  when: observability_metrics_enabled
