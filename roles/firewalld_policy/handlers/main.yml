---
- name: Reload firewalld
  ansible.builtin.raw: |
    nohup firewall-cmd --reload >/dev/null 2>&1 </dev/null &
    echo reloading
  changed_when: "'reloading' in firewalld_policy_reload.stdout_lines"
  register: firewalld_policy_reload
  vars:
    ansible_ssh_args: "{{ firewalld_policy_ssh_args }}"
