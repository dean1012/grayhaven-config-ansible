---
- name: Ensure firewalld policy cache directory exists
  ansible.builtin.file:
    path: /etc/grayhaven/firewall
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Derive vault firewalld policy path
  ansible.builtin.set_fact:
    firewalld_policy_vault_path: >-
      {{ grayhaven_vault_checkout_dir | default('/home/ansible/grayhaven-vault') }}/firewall.yml

- name: Check vault firewalld policy on the control node
  ansible.builtin.stat:
    path: "{{ firewalld_policy_vault_path }}"
  register: firewalld_policy_vault_stat
  delegate_to: localhost
  run_once: true

- name: Cache vault firewalld policy
  ansible.builtin.copy:
    src: "{{ firewalld_policy_vault_path }}"
    dest: /etc/grayhaven/firewall/policy.yml
    owner: root
    group: root
    mode: "0644"
  when: firewalld_policy_vault_stat.stat.exists

- name: Check cached firewalld policy
  ansible.builtin.stat:
    path: /etc/grayhaven/firewall/policy.yml
  register: firewalld_policy_cache_stat

- name: Notify Discord when cached firewalld policy is used
  ansible.builtin.include_role:
    name: automation_notifications
  vars:
    automation_notifications_title: Firewalld Policy Cache Used
    automation_notifications_color: "{{ automation_notifications_colors.info }}"
    automation_notifications_target: >-
      {{ inventory_hostname }}

      Environment: {{ grayhaven_environment }}
  when:
    - not firewalld_policy_vault_stat.stat.exists
    - firewalld_policy_cache_stat.stat.exists

- name: Notify Discord when firewalld policy is unavailable
  ansible.builtin.include_role:
    name: automation_notifications
  vars:
    automation_notifications_title: Firewalld Policy Unavailable - Existing Rules Preserved
    automation_notifications_color: "{{ automation_notifications_colors.warning }}"
    automation_notifications_target: >-
      {{ inventory_hostname }}

      Environment: {{ grayhaven_environment }}
  when:
    - not firewalld_policy_vault_stat.stat.exists
    - not firewalld_policy_cache_stat.stat.exists

- name: Read cached firewalld policy
  ansible.builtin.slurp:
    src: /etc/grayhaven/firewall/policy.yml
  register: firewalld_policy_cache_slurp
  when: firewalld_policy_cache_stat.stat.exists

- name: Parse cached firewalld policy
  ansible.builtin.set_fact:
    firewalld_policy_data: "{{ firewalld_policy_cache_slurp.content | b64decode | from_yaml }}"
  when: firewalld_policy_cache_stat.stat.exists

- name: Derive role firewalld policy
  ansible.builtin.set_fact:
    firewalld_policy_role_policy: "{{ firewalld_policy_data.firewalls[grayhaven_role] }}"
  when: firewalld_policy_cache_stat.stat.exists

- name: Initialize load-balancer TLS firewalld inbound policy
  ansible.builtin.set_fact:
    firewalld_policy_load_balancer_tls_inbound: []
  when:
    - firewalld_policy_cache_stat.stat.exists
    - grayhaven_role == "web"
    - grayhaven_tls_mode == "load_balancer"

- name: Keep only web origin ports needed for load-balancer TLS
  ansible.builtin.set_fact:
    firewalld_policy_load_balancer_tls_inbound: >-
      {{ firewalld_policy_load_balancer_tls_inbound + [item] }}
  loop: "{{ firewalld_policy_role_policy.inbound | default([]) }}"
  when:
    - firewalld_policy_cache_stat.stat.exists
    - grayhaven_role == "web"
    - grayhaven_tls_mode == "load_balancer"
    - not (item.protocol == "tcp" and item.port_range == "443")

- name: Allow private web deploy fanout between load-balanced web hosts
  ansible.builtin.set_fact:
    firewalld_policy_load_balancer_tls_inbound: >-
      {{
        firewalld_policy_load_balancer_tls_inbound
        + [{
          "protocol": "tcp",
          "port_range": "8791",
          "source_addresses": [],
          "source_tags": ["web"]
        }]
      }}
  when:
    - firewalld_policy_cache_stat.stat.exists
    - grayhaven_role == "web"
    - grayhaven_tls_mode == "load_balancer"
    - managed_inventory_web_private_sources | default([]) | length > 1

- name: Apply load-balancer TLS firewalld policy
  ansible.builtin.set_fact:
    firewalld_policy_role_policy: >-
      {{
        firewalld_policy_role_policy
        | combine({'inbound': firewalld_policy_load_balancer_tls_inbound})
      }}
  when:
    - firewalld_policy_cache_stat.stat.exists
    - grayhaven_role == "web"
    - grayhaven_tls_mode == "load_balancer"

- name: Install grayhaven firewalld zone from policy
  ansible.builtin.template:
    src: grayhaven-firewalld-zone.xml.j2
    dest: /etc/firewalld/zones/grayhaven.xml
    owner: root
    group: root
    mode: "0644"
  notify: Reload firewalld
  when: firewalld_policy_cache_stat.stat.exists

- name: Set grayhaven firewalld zone as the configured default
  ansible.builtin.lineinfile:
    path: /etc/firewalld/firewalld.conf
    regexp: '^DefaultZone='
    line: DefaultZone=grayhaven
    state: present
  notify: Reload firewalld
  when: firewalld_policy_cache_stat.stat.exists

- name: Reset SSH connection before firewalld starts
  ansible.builtin.meta: reset_connection

- name: Start and verify firewalld with fresh SSH sessions
  vars:
    ansible_ssh_args: "{{ firewalld_policy_ssh_args }}"
  block:
    - name: Check whether firewalld is enabled
      ansible.builtin.command:
        cmd: systemctl is-enabled --quiet firewalld
      register: firewalld_policy_enabled
      changed_when: false
      failed_when: false

    - name: Check whether firewalld is active
      ansible.builtin.command:
        cmd: systemctl is-active --quiet firewalld
      register: firewalld_policy_running
      changed_when: false
      failed_when: false

    - name: Enable firewalld
      ansible.builtin.systemd_service:
        name: firewalld
        enabled: true
      when: firewalld_policy_enabled.rc != 0

    - name: Start firewalld outside the active SSH session
      ansible.builtin.raw: |
        nohup systemctl start firewalld >/dev/null 2>&1 </dev/null &
        echo starting
      changed_when: "'starting' in firewalld_policy_start.stdout_lines"
      register: firewalld_policy_start
      when: firewalld_policy_running.rc != 0

    - name: Wait for SSH after firewalld starts
      ansible.builtin.wait_for_connection:
        delay: 1
        sleep: 2
        timeout: 60

    - name: Wait for firewalld to become active
      ansible.builtin.command:
        cmd: systemctl is-active firewalld
      register: firewalld_policy_active
      changed_when: false
      retries: 10
      delay: 3
      until: firewalld_policy_active.stdout == "active"

    - name: Reload firewalld after zone changes
      ansible.builtin.meta: flush_handlers

    - name: Wait for SSH after firewalld reloads
      ansible.builtin.wait_for_connection:
        delay: 1
        sleep: 2
        timeout: 60

    - name: Wait for firewalld to remain active after reload
      ansible.builtin.command:
        cmd: firewall-cmd --state
      register: firewalld_policy_reloaded
      changed_when: false
      retries: 10
      delay: 3
      until: firewalld_policy_reloaded.stdout == "running"

- name: Reset SSH connection after firewalld settles
  ansible.builtin.meta: reset_connection
