---
# Development hostnames are always protected, whether content comes from a
# repository-backed deployment or the generic fallback site.
- name: Create development basic-auth directory for nginx
  ansible.builtin.file:
    path: "{{ deploy_websites_dev_htpasswd_dir }}"
    state: directory
    owner: root
    group: nginx
    mode: "0750"

- name: Install development basic-auth files for nginx
  ansible.builtin.copy:
    dest: "{{ item.htpasswd_file }}"
    owner: root
    group: nginx
    mode: "0640"
    content: "{{ item.htpasswd_entries | map('trim') | join('\n') }}\n"
  loop: "{{ deploy_websites_sites }}"
  loop_control:
    label: "{{ item.root_name }}"
  no_log: true
  notify: Reload nginx
