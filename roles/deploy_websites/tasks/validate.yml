---
# Host TLS mode uses local Certbot certificates. Load balancer TLS mode keeps
# web hosts as HTTP backends and removes local certificate state.
- name: Validate website hosting variables
  ansible.builtin.assert:
    that:
      - hosted_domains is iterable
      - hosted_domains | length > 0
      - deploy_websites_certbot_email is string
      - deploy_websites_certbot_email | trim | length > 0
      - deploy_websites_certbot_environment in ["production", "staging"]
      - deploy_websites_tls_mode in ["host", "load_balancer"]
      - deploy_websites_tls_mode == "load_balancer" or digitalocean_dns_api_token is defined
    fail_msg: "Required website hosting variables were not provided."
    quiet: true
  no_log: true

- name: Validate hosted domain entries
  ansible.builtin.assert:
    that:
      - item.domain is defined
      - item.domain is string
      - item.domain | trim | length > 0
      - item.deployment is not defined or item.deployment is mapping
      - deploy_websites_domain_deployment | length == 0 or deploy_websites_domain_deployment.type is defined
      - deploy_websites_domain_deployment | length == 0 or deploy_websites_domain_deployment.type == "static"
      - >-
        deploy_websites_domain_deployment.repository is not defined
        or deploy_websites_domain_deployment.repository is mapping
      - not deploy_websites_repository_configured or deploy_websites_domain_repository.url is defined
      - not deploy_websites_repository_configured or deploy_websites_domain_repository.url is string
      - not deploy_websites_repository_configured or deploy_websites_domain_repository.url is match("^https://")
      - not deploy_websites_repository_configured or deploy_websites_domain_repository.webhook_secret is defined
      - not deploy_websites_repository_configured or deploy_websites_domain_repository.webhook_secret is string
      - >-
        not deploy_websites_repository_configured
        or deploy_websites_domain_repository.webhook_secret | trim | length > 0
    fail_msg: >-
      Each hosted domain must define a domain name. If deployment is present,
      only deployment.type=static is supported. If deployment.repository is
      present, it must define an HTTPS public repository URL and webhook secret.
    quiet: true
  loop: "{{ hosted_domains }}"
  loop_control:
    label: "{{ item.domain | default('undefined-domain') }}"
  vars:
    deploy_websites_domain_deployment: "{{ item.deployment | default({}) }}"
    deploy_websites_domain_repository: "{{ deploy_websites_domain_deployment.repository | default({}) }}"
    deploy_websites_repository_configured: "{{ deploy_websites_domain_repository | length > 0 }}"

- name: Validate hosted domain development authentication entries
  ansible.builtin.assert:
    that:
      - item.dev is defined
      - item.dev is mapping
      - item.dev.htpasswd_entries is defined
      - item.dev.htpasswd_entries is iterable
      - item.dev.htpasswd_entries | length > 0
      - item.dev.htpasswd_entries | select('match', '^[^:]+:.+') | list | length == item.dev.htpasswd_entries | length
    fail_msg: "Each hosted domain must define dev.htpasswd_entries."
    quiet: true
  loop: "{{ hosted_domains }}"
  loop_control:
    label: "{{ item.domain | default('undefined-domain') }}"
  no_log: true

- name: Initialize site definitions
  ansible.builtin.set_fact:
    deploy_websites_sites: []

- name: Initialize website certificate definitions
  ansible.builtin.set_fact:
    deploy_websites_certificate_sites: []

- name: Build site definitions from hosted domains
  ansible.builtin.set_fact:
    deploy_websites_sites: "{{ deploy_websites_sites + [deploy_websites_site] }}"
  loop: "{{ hosted_domains }}"
  loop_control:
    label: "{{ item.domain }}"
  vars:
    deploy_websites_domain: "{{ item.domain | trim }}"
    deploy_websites_deployment: "{{ item.deployment | default({}) }}"
    deploy_websites_repository: "{{ deploy_websites_deployment.repository | default({}) }}"
    deploy_websites_uses_repository: "{{ deploy_websites_repository | length > 0 }}"
    deploy_websites_site:
      root_name: "{{ deploy_websites_domain }}"
      uses_repository: "{{ deploy_websites_uses_repository | bool }}"
      repository_url: "{{ deploy_websites_repository.url | default('') | trim }}"
      repository_webhook_secret: "{{ deploy_websites_repository.webhook_secret | default('') | trim }}"
      checkout_paths:
        prod: "{{ deploy_websites_checkout_root }}/{{ deploy_websites_domain }}/main"
        dev: "{{ deploy_websites_checkout_root }}/{{ deploy_websites_domain }}/dev"
      fallback_paths:
        prod: "{{ deploy_websites_fallback_root }}/{{ deploy_websites_domain }}/prod"
        dev: "{{ deploy_websites_fallback_root }}/{{ deploy_websites_domain }}/dev"
      rendered_paths:
        dev: "{{ deploy_websites_rendered_root }}/{{ deploy_websites_domain }}/dev"
      content_sources:
        prod: >-
          {{
            deploy_websites_checkout_root ~ '/' ~ deploy_websites_domain ~ '/main/' ~ deploy_websites_frontend_path
            if deploy_websites_uses_repository | bool
            else deploy_websites_fallback_root ~ '/' ~ deploy_websites_domain ~ '/prod'
          }}
        dev: >-
          {{
            deploy_websites_checkout_root ~ '/' ~ deploy_websites_domain ~ '/dev/' ~ deploy_websites_frontend_path
            if deploy_websites_uses_repository | bool
            else deploy_websites_fallback_root ~ '/' ~ deploy_websites_domain ~ '/dev'
          }}
      domain: >-
        {{
          deploy_websites_domain
          if deploy_websites_environment == 'prod'
          else 'staging.' ~ deploy_websites_domain
        }}
      aliases:
        - >-
          {{
            'www.' ~ deploy_websites_domain
            if deploy_websites_environment == 'prod'
            else 'www.staging.' ~ deploy_websites_domain
          }}
      dev_domain: >-
        {{
          'dev.' ~ deploy_websites_domain
          if deploy_websites_environment == 'prod'
          else 'dev.staging.' ~ deploy_websites_domain
        }}
      cert_name: >-
        {{
          deploy_websites_domain
          if deploy_websites_environment == 'prod'
          else 'staging.' ~ deploy_websites_domain
        }}
      auth_realm: >-
        {{ item.dev.auth_realm | default(deploy_websites_domain ~ ' Development Environment') }}
      htpasswd_file: >-
        {{
          deploy_websites_dev_htpasswd_dir ~ '/'
          ~ (deploy_websites_domain | regex_replace('[^A-Za-z0-9_.-]', '_'))
          ~ '.htpasswd'
        }}
      htpasswd_entries: "{{ item.dev.htpasswd_entries }}"
  no_log: true

- name: Build website certificate definitions
  ansible.builtin.set_fact:
    deploy_websites_certificate_sites: >-
      {{
        deploy_websites_certificate_sites
        + [{
          "domain": item.domain,
          "aliases": item.aliases,
          "dev_domain": item.dev_domain,
          "cert_name": item.cert_name
        }]
      }}
  loop: "{{ deploy_websites_sites }}"
  loop_control:
    label: "{{ item.cert_name }}"
  no_log: true
