---
- name: Validate nginx configuration
  ansible.builtin.command:
    cmd: nginx -t
  changed_when: false
  listen: Reload nginx

- name: Reload nginx
  ansible.builtin.systemd_service:
    name: nginx
    state: reloaded
  listen: Reload nginx

- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
  listen: Reload systemd

- name: Restart website deployment webhook
  ansible.builtin.systemd_service:
    name: grayhaven-website-deploy-webhook.service
    state: restarted
    daemon_reload: true
  listen: Restart website deployment webhook
  when: deploy_websites_repository_deployments | default([]) | length > 0
