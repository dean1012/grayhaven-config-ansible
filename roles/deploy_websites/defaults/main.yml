---
deploy_websites_environment: prod
deploy_websites_root: /var/www
deploy_websites_checkout_root: /home/ansible/website-repos
deploy_websites_fallback_root: /home/ansible/website-fallbacks
deploy_websites_frontend_path: site/frontend

deploy_websites_certbot_email: jsmith@grayhavensystems.com
deploy_websites_certificate_environment: staging
deploy_websites_tls_mode: host
deploy_websites_certbot_environment: "{{ deploy_websites_certificate_environment }}"
deploy_websites_certbot_credentials_file: /etc/letsencrypt/digitalocean.ini
deploy_websites_dev_htpasswd_dir: /etc/nginx/grayhaven-dev.htpasswd.d

deploy_websites_packages:
  - certbot
  - git
  - nginx
  - python3-certbot-dns-digitalocean
  - python3-certbot-nginx
  - rsync

hosted_domains: []
