---
- name: Validate managed user list
  ansible.builtin.assert:
    that:
      - users is defined
      - users is sequence
    fail_msg: "The users variable must be defined as a list."
    quiet: true

- name: Set managed user archive path
  ansible.builtin.set_fact:
    admin_access_homedir_archive_path: >-
      {{
        backup.repositories.local.homedir_archive_path
        | default(admin_access_default_homedir_archive_path)
      }}

- name: Ensure managed user archive path exists
  ansible.builtin.file:
    path: "{{ admin_access_homedir_archive_path }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Validate managed user entries
  ansible.builtin.assert:
    that:
      - item.username is defined
      - item.username is string
      - item.username | trim | length > 0
      - item.state | default('present') in ['present', 'absent']
      - item.home_mode | default('archive') in ['archive', 'delete']
      - item.tmux_auto_attach is not defined or item.tmux_auto_attach is boolean
      - item.tmux_workspace is not defined or item.tmux_workspace is string
      - item.tmux_workspace is not defined or item.tmux_workspace | trim | length > 0
      - item.tmux_workspace is not defined or item.tmux_workspace is match('^[A-Za-z0-9._-]+\\.tmux$')
      - >
        (
          item.tmux_auto_attach is not defined
          and item.tmux_workspace is not defined
        )
        or (item.sudo | default(false) | bool)
      - >
        item.state | default('present') == 'absent'
        or (
          item.full_name is defined
          and item.password_hash is defined
          and item.ssh_keys is defined
          and item.ssh_keys is sequence
        )
    fail_msg: "Present users require full_name, password_hash, and ssh_keys."
    quiet: true
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.username | default('undefined') }}"
  no_log: true

- name: Derive managed user state lists
  ansible.builtin.set_fact:
    admin_access_present_users: >-
      {{
        users | selectattr('state', 'undefined') | list
        + users | selectattr('state', 'equalto', 'present') | list
      }}
    admin_access_absent_users: >-
      {{
        users
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}

- name: Derive present sudo managed users
  ansible.builtin.set_fact:
    admin_access_present_sudo_users: >-
      {{
        admin_access_present_users
        | selectattr('sudo', 'defined')
        | selectattr('sudo')
        | list
      }}

- name: Manage present users
  ansible.builtin.user:
    name: "{{ item.username }}"
    comment: "{{ item.full_name }}"
    create_home: true
    shell: /bin/bash
    groups: "{{ (item.sudo | default(false) | bool) | ternary('wheel', '') }}"
    append: false
    password: "{{ item.password_hash }}"
    state: present
  loop: "{{ admin_access_present_users }}"
  loop_control:
    label: "{{ item.username }}"
  no_log: true

- name: Create present user SSH directories
  ansible.builtin.file:
    path: "/home/{{ item.username }}/.ssh"
    state: directory
    owner: "{{ item.username }}"
    group: "{{ item.username }}"
    mode: "0700"
  loop: "{{ admin_access_present_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Install present user authorized SSH keys
  ansible.builtin.copy:
    dest: "/home/{{ item.username }}/.ssh/authorized_keys"
    owner: "{{ item.username }}"
    group: "{{ item.username }}"
    mode: "0600"
    content: "{{ item.ssh_keys | join('\n') }}\n"
  loop: "{{ admin_access_present_users }}"
  loop_control:
    label: "{{ item.username }}"
  no_log: true

- name: Check absent user home directories
  ansible.builtin.stat:
    path: "/home/{{ item.username }}"
  register: admin_access_absent_homes
  loop: "{{ admin_access_absent_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Archive absent user home directories before deletion
  ansible.builtin.command:
    cmd: >-
      tar -C /home
      -czf
      {{ admin_access_homedir_archive_path }}/{{ admin_access_archive_filename }}
      {{ item.item.username }}
  when:
    - item.stat.exists
    - item.item.home_mode | default('archive') == 'archive'
  loop: "{{ admin_access_absent_homes.results }}"
  loop_control:
    label: "{{ item.item.username }}"
  changed_when: true
  vars:
    admin_access_archive_filename: >-
      {{ item.item.username }}-{{ inventory_hostname }}-{{ ansible_date_time.iso8601_basic_short }}.tar.gz

- name: Remove absent users
  ansible.builtin.user:
    name: "{{ item.username }}"
    state: absent
    remove: true
  loop: "{{ admin_access_absent_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Enforce managed sudo user audit rules
  ansible.builtin.import_tasks: audit.yml

- name: Enforce managed user tmux and shell helpers
  ansible.builtin.import_tasks: tmux.yml
