---
- name: Install audit rule utilities
  ansible.builtin.dnf:
    name:
      - audit
      - audit-rules
    state: present

- name: Enable and start audit daemon
  ansible.builtin.service:
    name: auditd
    state: started
    enabled: true

- name: Ensure audit rules directory exists
  ansible.builtin.file:
    path: /etc/audit/rules.d
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Retire legacy root-command exec audit rules
  ansible.builtin.template:
    src: grayhaven-root-command.rules.j2
    dest: /etc/audit/rules.d/50-grayhaven-root-command.rules
    owner: root
    group: root
    mode: "0600"

- name: Install interactive root command journal logger
  ansible.builtin.template:
    src: grayhaven-root-command-audit.sh.j2
    dest: /etc/profile.d/grayhaven-root-command-audit.sh
    owner: root
    group: root
    mode: "0644"

- name: Check audit rule load state
  ansible.builtin.command:
    cmd: /usr/sbin/augenrules --check
  changed_when: >-
    'Rules have changed' in
    (
      admin_access_augenrules_check.stdout
      ~ admin_access_augenrules_check.stderr
    )
  register: admin_access_augenrules_check
  notify: Load audit rules
