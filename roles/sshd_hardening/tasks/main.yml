---
- name: Check current SELinux enforcement mode
  ansible.builtin.command:
    cmd: getenforce
  register: sshd_hardening_getenforce
  changed_when: false
  failed_when: sshd_hardening_getenforce.rc not in [0, 1]

- name: Set SELinux enforcing mode immediately when available
  ansible.builtin.command:
    cmd: setenforce 1
  register: sshd_hardening_setenforce
  changed_when: true
  failed_when: sshd_hardening_setenforce.rc not in [0, 1]
  when:
    - ansible_facts.selinux.status | default("disabled") != "disabled"
    - sshd_hardening_getenforce.stdout != "Enforcing"

- name: Persist SELinux enforcing mode
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: "^SELINUX="
    line: SELINUX=enforcing
    create: false
    mode: "0644"

- name: Install SSH hardening drop-in
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-grayhaven-hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
      Banner /etc/issue
      ClientAliveInterval 60
      ClientAliveCountMax 5
      LoginGraceTime 30
      MaxAuthTries 3
      UseDNS no
  notify: Restart sshd

- name: Enable and start SSH daemon
  ansible.builtin.service:
    name: sshd
    state: started
    enabled: true
