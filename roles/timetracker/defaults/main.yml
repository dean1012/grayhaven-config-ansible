---
timetracker_user: timetracker
timetracker_group: timetracker
timetracker_uid: 777
timetracker_gid: 777
timetracker_container_name: grayhaven-timetracker
timetracker_container_port: 8000
timetracker_host_port: 8000
timetracker_image_repository: ghcr.io/dean1012/grayhaven-timetracker
timetracker_database_filename: timetracker.sqlite3
timetracker_quadlet_dir: /etc/containers/systemd
timetracker_quadlet_path: "{{ timetracker_quadlet_dir }}/grayhaven-timetracker.container"
timetracker_service_name: grayhaven-timetracker.service
timetracker_backup_retention_days: "{{ timetracker.backup_retention_days | default(14) }}"
timetracker_branding_source_root: "{{ branding_checkout_dir }}"
timetracker_tls_mode: "{{ grayhaven_tls_mode | default('host') }}"
timetracker_certificate_environment: "{{ grayhaven_certificate_environment | default('staging') }}"
timetracker_certbot_credentials_file: /etc/letsencrypt/digitalocean.ini
timetracker_certbot_marker_dir: /etc/grayhaven/certbot
timetracker_health_retries: 30
timetracker_health_delay: 2
