---
- name: Check Time Tracker database state
  ansible.builtin.stat:
    path: "{{ timetracker.data_dir }}/{{ timetracker_database_filename }}"
  register: timetracker_database_state

- name: Check deployed SQLCipher passphrase
  ansible.builtin.stat:
    path: "{{ timetracker.secrets_dir }}/sqlcipher_passphrase"
  register: timetracker_sqlcipher_secret_state

- name: Read deployed SQLCipher passphrase for rotation guard
  ansible.builtin.slurp:
    src: "{{ timetracker.secrets_dir }}/sqlcipher_passphrase"
  register: timetracker_deployed_sqlcipher_secret
  when: timetracker_sqlcipher_secret_state.stat.exists
  no_log: true

- name: Reject uncoordinated SQLCipher passphrase replacement
  ansible.builtin.assert:
    that:
      - >-
        not timetracker_database_state.stat.exists
        or not timetracker_sqlcipher_secret_state.stat.exists
        or (timetracker_deployed_sqlcipher_secret.content | b64decode | trim)
        == timetracker_secrets.sqlcipher_passphrase
    fail_msg: >-
      Refusing to replace the SQLCipher passphrase for an existing database.
      Complete the documented offline rekey procedure first.
    quiet: true
  no_log: true

- name: Store Time Tracker Flask signing key
  ansible.builtin.copy:
    dest: "{{ timetracker.secrets_dir }}/flask_secret_key"
    owner: "{{ timetracker_user }}"
    group: "{{ timetracker_group }}"
    mode: "0400"
    content: "{{ timetracker_secrets.flask_secret_key }}\n"
  notify: Restart Time Tracker
  no_log: true

- name: Store Time Tracker SQLCipher passphrase
  ansible.builtin.copy:
    dest: "{{ timetracker.secrets_dir }}/sqlcipher_passphrase"
    owner: "{{ timetracker_user }}"
    group: "{{ timetracker_group }}"
    mode: "0400"
    content: "{{ timetracker_secrets.sqlcipher_passphrase }}\n"
  notify: Restart Time Tracker
  no_log: true

- name: Initialize Time Tracker bootstrap manifest
  ansible.builtin.set_fact:
    timetracker_bootstrap_manifest: []
  no_log: true

- name: Build Time Tracker bootstrap manifest
  ansible.builtin.set_fact:
    timetracker_bootstrap_manifest: >-
      {{
        timetracker_bootstrap_manifest
        + [{
          'email': item.email,
          'first_name': item.first_name,
          'last_name': item.last_name,
          'password_hash': item.password_hash,
          'role': 'admin' if item.admin else 'user',
          'totp_secret': item.totp_secret | default(None),
          'enabled': true
        }]
      }}
  loop: "{{ timetracker_secrets.initial_users }}"
  no_log: true

- name: Store Time Tracker bootstrap manifest
  ansible.builtin.copy:
    dest: "{{ timetracker.secrets_dir }}/bootstrap_users"
    owner: "{{ timetracker_user }}"
    group: "{{ timetracker_group }}"
    mode: "0400"
    content: "{{ timetracker_bootstrap_manifest | to_nice_json }}\n"
  notify: Restart Time Tracker
  no_log: true
