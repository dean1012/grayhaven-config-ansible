---
- name: Update installed operating system packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_only: true

- name: Install EPEL release package
  ansible.builtin.dnf:
    name: epel-release
    state: present

- name: Install baseline administration packages
  ansible.builtin.dnf:
    name: "{{ managed_baseline_admin_packages + managed_baseline_required_packages }}"
    state: present

- name: Upgrade pip
  ansible.builtin.command:
    cmd: /usr/bin/python3 -m pip install --upgrade --root-user-action=ignore pip
  register: managed_baseline_pip_upgrade
  changed_when: "'Successfully installed' in managed_baseline_pip_upgrade.stdout"

- name: Ensure Ansible runtime directory exists on bastion hosts
  ansible.builtin.file:
    path: "{{ managed_baseline_ansible_runtime_venv | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: grayhaven_role == "bastion"

- name: Create Ansible runtime virtual environment on bastion hosts
  ansible.builtin.command:
    cmd: /usr/bin/python3 -m venv "{{ managed_baseline_ansible_runtime_venv }}"
    creates: "{{ managed_baseline_ansible_runtime_venv }}/bin/python"
  when: grayhaven_role == "bastion"

- name: Upgrade Ansible runtime virtual environment pip on bastion hosts
  ansible.builtin.command:
    cmd: >-
      {{ managed_baseline_ansible_runtime_venv }}/bin/python
      -m pip install --upgrade pip
  register: managed_baseline_ansible_runtime_pip_upgrade
  changed_when: >-
    'Successfully installed' in managed_baseline_ansible_runtime_pip_upgrade.stdout
  when: grayhaven_role == "bastion"

- name: Install pinned Ansible runtime on bastion hosts
  ansible.builtin.command:
    cmd: >-
      {{ managed_baseline_ansible_runtime_venv }}/bin/python
      -m pip install --upgrade
      --require-hashes
      --requirement
      {{ managed_baseline_runner_checkout_dir }}/pip3_requirements.txt
  register: managed_baseline_ansible_install
  changed_when: "'Successfully installed' in managed_baseline_ansible_install.stdout"
  when: grayhaven_role == "bastion"

- name: Link Ansible runtime commands on bastion hosts
  ansible.builtin.file:
    src: "{{ managed_baseline_ansible_runtime_venv }}/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
    force: true
    owner: root
    group: root
  loop:
    - ansible
    - ansible-galaxy
    - ansible-inventory
    - ansible-playbook
    - ansible-vault
  when: grayhaven_role == "bastion"

- name: Remove RPM-managed Ansible runtime from non-bastion hosts
  ansible.builtin.dnf:
    name:
      - ansible-core
    state: absent
  when: grayhaven_role != "bastion"

- name: Remove pip-managed Ansible runtime from non-bastion hosts
  ansible.builtin.command:
    cmd: /usr/bin/python3 -m pip uninstall --yes ansible ansible-core
  register: managed_baseline_ansible_uninstall
  changed_when: "'Successfully uninstalled' in managed_baseline_ansible_uninstall.stdout"
  when: grayhaven_role != "bastion"

- name: Stop and disable unnecessary services
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  failed_when: false
  loop: "{{ managed_baseline_unneeded_services }}"

- name: Remove unnecessary packages
  ansible.builtin.dnf:
    name: "{{ managed_baseline_unneeded_packages }}"
    state: absent
