---
- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Install local hosts file
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"

- name: Build bastion SSH known-host scan targets
  ansible.builtin.set_fact:
    managed_baseline_known_host_scan_targets: >-
      {%- set targets = [] -%}
      {%- for managed_host in managed_baseline_hosts | default([]) -%}
      {%- if managed_host.fqdn != inventory_hostname and managed_host.private_ip | default('') | string | length > 0 -%}
      {%- set managed_host_aliases = [managed_host.host_alias, managed_host.host_alias ~ '.internal'] -%}
      {%- set _ = targets.extend(managed_host_aliases + [managed_host.private_ip]) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ targets | unique | list }}
  when: grayhaven_role == "bastion"

- name: Scan managed host SSH keys from bastion
  ansible.builtin.command:
    cmd: >-
      ssh-keyscan -T 5 -t ed25519
      {{ managed_baseline_known_host_scan_targets | map('quote') | join(' ') }}
  register: managed_baseline_known_host_scan
  changed_when: false
  when:
    - grayhaven_role == "bastion"
    - managed_baseline_known_host_scan_targets | default([]) | length > 0

- name: Install managed global SSH known hosts on bastion
  ansible.builtin.copy:
    dest: /etc/ssh/ssh_known_hosts
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible. Do not edit manually.
      {{ managed_baseline_known_host_scan.stdout }}
  when:
    - grayhaven_role == "bastion"
    - managed_baseline_known_host_scan_targets | default([]) | length > 0

- name: Create local Ansible facts directory
  ansible.builtin.file:
    path: /etc/ansible/facts.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Publish Grayhaven local host facts
  ansible.builtin.copy:
    dest: /etc/ansible/facts.d/grayhaven.fact
    owner: root
    group: root
    mode: "0644"
    content: "{{ managed_baseline_local_fact | to_nice_json }}\n"
  vars:
    managed_baseline_local_fact:
      environment: "{{ managed_baseline_environment }}"
      hostname: "{{ inventory_hostname }}"
      role: "{{ grayhaven_role }}"
      tags: "{{ do_tags | default([]) | sort }}"
      private_ipv4: "{{ grayhaven_private_ipv4 | default('') }}"
      public_ipv4: "{{ grayhaven_public_ipv4 | default('') }}"

- name: Install login issue banner
  ansible.builtin.template:
    src: issue.j2
    dest: /etc/issue
    owner: root
    group: root
    mode: "0644"

- name: Install message of the day
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
