---
- name: Set root password hash
  ansible.builtin.user:
    name: root
    password: "{{ root_password_hash }}"
  no_log: true

- name: Remove root authorized SSH keys
  ansible.builtin.file:
    path: /root/.ssh/authorized_keys
    state: absent

- name: Create ansible automation user
  ansible.builtin.user:
    name: ansible
    comment: Grayhaven Systems LLC automation user
    create_home: true
    shell: /bin/bash
    password_lock: true
    state: present

- name: Grant ansible passwordless sudo
  ansible.builtin.copy:
    dest: /etc/sudoers.d/ansible
    owner: root
    group: root
    mode: "0440"
    content: |
      ansible ALL=(ALL) NOPASSWD: ALL
    validate: /usr/sbin/visudo -cf %s

- name: Create ansible SSH directory
  ansible.builtin.file:
    path: /home/ansible/.ssh
    state: directory
    owner: ansible
    group: ansible
    mode: "0700"

- name: Install vault Ansible control private key on bastion hosts
  ansible.builtin.copy:
    dest: /home/ansible/.ssh/id_ed25519
    owner: ansible
    group: ansible
    mode: "0600"
    content: "{{ ansible_control_private_key | trim }}\n"
  when: grayhaven_role == "bastion"
  no_log: true

- name: Install vault Ansible control public key on bastion hosts
  ansible.builtin.copy:
    dest: /home/ansible/.ssh/id_ed25519.pub
    owner: ansible
    group: ansible
    mode: "0644"
    content: "{{ ansible_control_public_key | trim }}\n"
  when: grayhaven_role == "bastion"
  no_log: true

- name: Enforce vault Ansible control authorized key on managed hosts
  ansible.builtin.copy:
    dest: /home/ansible/.ssh/authorized_keys
    owner: ansible
    group: ansible
    mode: "0600"
    content: "{{ ansible_control_public_key | trim }}\n"
  no_log: true
