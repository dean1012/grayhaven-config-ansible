---
- name: Ensure firewalld policy cache directory exists
  ansible.builtin.file:
    path: /etc/grayhaven/firewall
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Derive vault firewalld policy path
  ansible.builtin.set_fact:
    managed_baseline_vault_firewall_policy_path: >-
      {{ managed_baseline_vault_checkout_dir | default('/home/ansible/grayhaven-vault') }}/firewall.yml

- name: Check vault firewalld policy
  ansible.builtin.stat:
    path: "{{ managed_baseline_vault_firewall_policy_path }}"
  register: managed_baseline_vault_firewall_policy

- name: Cache vault firewalld policy
  ansible.builtin.copy:
    src: "{{ managed_baseline_vault_firewall_policy_path }}"
    dest: /etc/grayhaven/firewall/policy.yml
    owner: root
    group: root
    mode: "0644"
    remote_src: true
  when: managed_baseline_vault_firewall_policy.stat.exists

- name: Check cached firewalld policy
  ansible.builtin.stat:
    path: /etc/grayhaven/firewall/policy.yml
  register: managed_baseline_firewall_policy_cache

- name: Notify Discord when cached firewalld policy is used
  ansible.builtin.include_role:
    name: automation_notifications
  vars:
    automation_notifications_title: Firewalld Policy Cache Used
    automation_notifications_color: "{{ automation_notifications_colors.info }}"
    automation_notifications_target: >-
      {{ inventory_hostname }}

      Environment: {{ managed_baseline_environment }}
  when:
    - not managed_baseline_vault_firewall_policy.stat.exists
    - managed_baseline_firewall_policy_cache.stat.exists

- name: Notify Discord when firewalld policy is unavailable
  ansible.builtin.include_role:
    name: automation_notifications
  vars:
    automation_notifications_title: Firewalld Policy Unavailable - Existing Rules Preserved
    automation_notifications_color: "{{ automation_notifications_colors.warning }}"
    automation_notifications_target: >-
      {{ inventory_hostname }}

      Environment: {{ managed_baseline_environment }}
  when:
    - not managed_baseline_vault_firewall_policy.stat.exists
    - not managed_baseline_firewall_policy_cache.stat.exists

- name: Read cached firewalld policy
  ansible.builtin.slurp:
    src: /etc/grayhaven/firewall/policy.yml
  register: managed_baseline_firewall_policy_slurp
  when: managed_baseline_firewall_policy_cache.stat.exists

- name: Parse cached firewalld policy
  ansible.builtin.set_fact:
    managed_baseline_firewall_policy: "{{ managed_baseline_firewall_policy_slurp.content | b64decode | from_yaml }}"
  when: managed_baseline_firewall_policy_cache.stat.exists

- name: Derive role firewalld policy
  ansible.builtin.set_fact:
    managed_baseline_firewall_role_policy: "{{ managed_baseline_firewall_policy.firewalls[grayhaven_role] }}"
  when: managed_baseline_firewall_policy_cache.stat.exists

- name: Install grayhaven firewalld zone from policy
  ansible.builtin.template:
    src: grayhaven-firewalld-zone.xml.j2
    dest: /etc/firewalld/zones/grayhaven.xml
    owner: root
    group: root
    mode: "0644"
  notify: Reload firewalld
  when: managed_baseline_firewall_policy_cache.stat.exists

- name: Set grayhaven firewalld zone as the configured default
  ansible.builtin.lineinfile:
    path: /etc/firewalld/firewalld.conf
    regexp: '^DefaultZone='
    line: DefaultZone=grayhaven
    state: present
  notify: Reload firewalld
  when: managed_baseline_firewall_policy_cache.stat.exists

- name: Enable and start firewalld without blocking SSH convergence
  ansible.builtin.systemd_service:
    name: firewalld
    state: started
    enabled: true
    no_block: true

- name: Reset SSH connection after firewalld starts
  ansible.builtin.meta: reset_connection

- name: Wait for firewalld to become active
  ansible.builtin.command:
    cmd: systemctl is-active firewalld
  register: managed_baseline_firewalld_active
  changed_when: false
  retries: 10
  delay: 3
  until: managed_baseline_firewalld_active.stdout == "active"

- name: Reload firewalld after zone changes
  ansible.builtin.meta: flush_handlers

- name: Reset SSH connection after firewalld reloads
  ansible.builtin.meta: reset_connection
