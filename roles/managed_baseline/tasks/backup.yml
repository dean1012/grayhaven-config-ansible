---
- name: Validate backup inputs
  ansible.builtin.import_tasks: backup-validate.yml

- name: Derive backup settings
  ansible.builtin.import_tasks: backup-settings.yml

- name: Enforce optional GCS remote backup bucket
  ansible.builtin.import_tasks: backup-gcs.yml

- name: Enforce local restic backup
  ansible.builtin.import_tasks: backup-local.yml

- name: Install managed backup operator utility
  ansible.builtin.import_tasks: backupctl.yml
