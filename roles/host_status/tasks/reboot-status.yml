---
- name: Check whether a reboot is required
  ansible.builtin.command:
    cmd: needs-restarting -r
  register: host_status_reboot_check
  changed_when: false
  failed_when: host_status_reboot_check.rc not in [0, 1]

- name: Record reboot requirement fact
  ansible.builtin.set_fact:
    host_status_reboot_required: "{{ host_status_reboot_check.rc == 1 }}"
