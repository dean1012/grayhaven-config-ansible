---
- name: Derive fail2ban ignore source list
  ansible.builtin.set_fact:
    fail2ban_policy_ignore_sources: >-
      {{
        (
          [
            '127.0.0.1/8',
            '::1'
          ]
          + (managed_inventory_bastion_private_sources | default([]))
        )
        | unique
      }}
    fail2ban_policy_nginx_http_auth_enabled: >-
      {{
        grayhaven_role == 'web'
        and (grayhaven_tls_mode | default('host')) == 'host'
      }}

- name: Install Grayhaven fail2ban jail policy
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/grayhaven.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [DEFAULT]
      ignoreip = {{ fail2ban_policy_ignore_sources | join(' ') }}
      bantime = 1h
      findtime = 10m
      maxretry = 5
      banaction = firewallcmd-rich-rules
      banaction_allports = firewallcmd-rich-rules

      [sshd]
      enabled = true
      backend = systemd
      mode = aggressive
      port = ssh

      {% if fail2ban_policy_nginx_http_auth_enabled | bool %}
      {% for domain in hosted_domains | default([]) | map(attribute='domain') | list %}
      [nginx-http-auth-{{ domain | regex_replace('[^A-Za-z0-9_-]', '-') }}]
      enabled = true
      filter = nginx-http-auth
      port = http,https
      logpath = /var/log/nginx/{{ domain }}.dev.error.log

      {% endfor %}
      {% endif %}
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
