---
# Host TLS mode uses local Certbot certificates. Load balancer TLS mode keeps
# web hosts as HTTP backends and removes local certificate state.
- name: Validate web static hosting variables
  ansible.builtin.assert:
    that:
      - hosted_domains is iterable
      - hosted_domains | length > 0
      - web_static_certbot_email is string
      - web_static_certbot_email | trim | length > 0
      - web_static_certbot_environment in ["production", "staging"]
      - web_static_tls_mode in ["host", "load_balancer"]
      - web_static_tls_mode == "load_balancer" or digitalocean_dns_api_token is defined
    fail_msg: "Required web static hosting variables were not provided."
    quiet: true
  no_log: true

- name: Validate hosted domain entries
  ansible.builtin.assert:
    that:
      - item.domain is defined
      - item.domain is string
      - item.domain | trim | length > 0
      - item.dev is defined
      - item.dev is mapping
      - item.dev.htpasswd_entries is defined
      - item.dev.htpasswd_entries is iterable
      - item.dev.htpasswd_entries | length > 0
      - item.dev.htpasswd_entries | select('match', '^[^:]+:.+') | list | length == item.dev.htpasswd_entries | length
    fail_msg: "Each hosted domain must define domain and dev.htpasswd_entries."
    quiet: true
  loop: "{{ hosted_domains }}"
  loop_control:
    label: "{{ item.domain | default('undefined-domain') }}"
  no_log: true

- name: Initialize static site definitions
  ansible.builtin.set_fact:
    web_static_sites: []

- name: Build static site definitions from hosted domains
  ansible.builtin.set_fact:
    web_static_sites: "{{ web_static_sites + [web_static_site] }}"
  loop: "{{ hosted_domains }}"
  loop_control:
    label: "{{ item.domain }}"
  vars:
    web_static_domain: "{{ item.domain | trim }}"
    web_static_source_name: "{{ item.static_site | default('') | trim }}"
    web_static_site:
      root_name: "{{ web_static_domain }}"
      source_name: "{{ web_static_source_name }}"
      domain: "{{ web_static_domain if web_static_environment == 'prod' else 'staging.' ~ web_static_domain }}"
      aliases:
        - >-
          {{
            'www.' ~ web_static_domain
            if web_static_environment == 'prod'
            else 'www.staging.' ~ web_static_domain
          }}
      dev_domain: >-
        {{
          'dev.' ~ web_static_domain
          if web_static_environment == 'prod'
          else 'dev.staging.' ~ web_static_domain
        }}
      cert_name: >-
        {{
          web_static_domain
          if web_static_environment == 'prod'
          else 'staging.' ~ web_static_domain
        }}
      auth_realm: >-
        {{ item.dev.auth_realm | default(web_static_domain ~ ' Development Environment') }}
      htpasswd_file: >-
        {{
          web_static_dev_htpasswd_dir ~ '/'
          ~ (web_static_domain | regex_replace('[^A-Za-z0-9_.-]', '_'))
          ~ '.htpasswd'
        }}
      htpasswd_entries: "{{ item.dev.htpasswd_entries }}"
  no_log: true

- name: Install web hosting packages
  ansible.builtin.dnf:
    name: "{{ web_static_packages }}"
    state: present

- name: Create Certbot configuration directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/letsencrypt
    - /etc/letsencrypt/renewal-hooks
    - /etc/letsencrypt/renewal-hooks/deploy
  when: web_static_tls_mode == "host"

- name: Remove host certificate material in load balancer TLS mode
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/letsencrypt/live
    - /etc/letsencrypt/archive
    - /etc/letsencrypt/renewal
  when: web_static_tls_mode == "load_balancer"
  notify: Reload nginx

- name: Disable Certbot renewal timer in load balancer TLS mode
  ansible.builtin.systemd_service:
    name: certbot-renew.timer
    enabled: false
    state: stopped
  failed_when: false
  when: web_static_tls_mode == "load_balancer"

- name: Validate DigitalOcean DNS token in host TLS mode
  ansible.builtin.assert:
    that:
      - digitalocean_dns_api_token is string
      - digitalocean_dns_api_token | trim | length > 0
    fail_msg: "digitalocean_dns_api_token is required in host TLS mode."
    quiet: true
  when: web_static_tls_mode == "host"
  no_log: true

- name: Install Certbot DigitalOcean credentials file
  ansible.builtin.copy:
    dest: "{{ web_static_certbot_credentials_file }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      dns_digitalocean_token = {{ digitalocean_dns_api_token | trim }}
  when: web_static_tls_mode == "host"
  no_log: true

- name: Remove Certbot DigitalOcean credentials file in load balancer TLS mode
  ansible.builtin.file:
    path: "{{ web_static_certbot_credentials_file }}"
    state: absent
  when: web_static_tls_mode == "load_balancer"
  no_log: true

# Development hostnames are intentionally protected while temporary static sites
# are served from this repository.
- name: Create development basic-auth directory for nginx
  ansible.builtin.file:
    path: "{{ web_static_dev_htpasswd_dir }}"
    state: directory
    owner: root
    group: nginx
    mode: "0750"

- name: Install development basic-auth files for nginx
  ansible.builtin.copy:
    dest: "{{ item.htpasswd_file }}"
    owner: root
    group: nginx
    mode: "0640"
    content: "{{ item.htpasswd_entries | map('trim') | join('\n') }}\n"
  loop: "{{ web_static_sites }}"
  loop_control:
    label: "{{ item.root_name }}"
  no_log: true
  notify: Reload nginx

- name: Create static website directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ web_static_required_directories }}"
  vars:
    web_static_site_directories: >-
      {{
        web_static_sites
        | map(attribute='root_name')
        | product(['prod', 'dev'])
        | map('join', '/')
        | map('regex_replace', '^', web_static_root ~ '/')
        | list
      }}
    web_static_required_directories: "{{ [web_static_assets_root] + web_static_site_directories }}"

- name: Deploy shared static website assets
  ansible.builtin.copy:
    src: "{{ web_static_source_root }}/assets/"
    dest: "{{ web_static_assets_root }}/"
    owner: root
    group: root
    directory_mode: "0755"
    mode: "0644"
  notify: Reload nginx

- name: Deploy temporary static website content
  ansible.builtin.copy:
    src: "{{ web_static_source_root }}/{{ item.0.source_name }}/{{ item.1 }}/"
    dest: "{{ web_static_root }}/{{ item.0.root_name }}/{{ item.1 }}/"
    owner: root
    group: root
    directory_mode: "0755"
    mode: "0644"
  loop: "{{ web_static_sites | selectattr('source_name') | product(['prod', 'dev']) | list }}"
  loop_control:
    label: "{{ item.0.root_name }} {{ item.1 }}"
  notify: Reload nginx

- name: Deploy generic static website content
  ansible.builtin.template:
    src: "generic-static-site-{{ item.1 }}.html.j2"
    dest: "{{ web_static_root }}/{{ item.0.root_name }}/{{ item.1 }}/index.html"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ web_static_sites | rejectattr('source_name') | product(['prod', 'dev']) | list }}"
  loop_control:
    label: "{{ item.0.root_name }} {{ item.1 }}"
  vars:
    web_static_generic_domain: "{{ item.0.root_name }}"
  notify: Reload nginx

- name: Restore SELinux contexts for static website content
  ansible.builtin.command:
    cmd: "restorecon -RFv {{ web_static_root }}"
  register: web_static_restorecon
  changed_when: web_static_restorecon.stdout | trim | length > 0

# Initial host certificates are issued only in host TLS mode. In load balancer
# TLS mode, OpenTofu owns the certificate attached to the DigitalOcean load
# balancer.
- name: Issue or renew initial Let's Encrypt certificates
  ansible.builtin.command:
    argv: "{{ web_static_certbot_command }}"
    creates: "/etc/letsencrypt/live/{{ item.cert_name }}/fullchain.pem"
  vars:
    web_static_certbot_domains: "{{ [item.domain] + item.aliases + [item.dev_domain] }}"
    web_static_certbot_domain_args: >-
      {{
        web_static_certbot_domains
        | map('regex_replace', '^', '-d ')
        | join(' ')
        | split(' ')
      }}
    web_static_certbot_command: >-
      {{
        [
          'certbot',
          'certonly',
          '--non-interactive',
          '--agree-tos',
          '--email', web_static_certbot_email,
          '--cert-name', item.cert_name,
          '--dns-digitalocean',
          '--dns-digitalocean-credentials', web_static_certbot_credentials_file,
          '--dns-digitalocean-propagation-seconds', '30'
        ]
        + (['--test-cert'] if web_static_certbot_environment == 'staging' else [])
        + web_static_certbot_domain_args
      }}
  loop: "{{ web_static_sites }}"
  loop_control:
    label: "{{ item.cert_name }}"
  notify: Reload nginx
  when: web_static_tls_mode == "host"

- name: Verify host TLS certificate files exist
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ item.cert_name }}/fullchain.pem"
  loop: "{{ web_static_sites }}"
  loop_control:
    label: "{{ item.cert_name }}"
  register: web_static_certificate_stats
  when: web_static_tls_mode == "host"

- name: Fail if host TLS certificate files are missing
  ansible.builtin.assert:
    that:
      - web_static_certificate_stats.results | map(attribute='stat.exists') | min
    fail_msg: "One or more host TLS certificate files are missing after Certbot execution."
    quiet: true
  when: web_static_tls_mode == "host"

- name: Install nginx static site configuration
  ansible.builtin.template:
    src: static-sites.conf.j2
    dest: /etc/nginx/conf.d/grayhaven-static-sites.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Remove nginx default welcome configuration
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Reload nginx

- name: Install Certbot renewal deploy hook
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -Eeuo pipefail

      systemctl reload nginx
  when: web_static_tls_mode == "host"

- name: Enable Certbot renewal timer when present
  ansible.builtin.systemd_service:
    name: certbot-renew.timer
    enabled: true
    state: started
  failed_when: false
  when: web_static_tls_mode == "host"

- name: Enable and start nginx
  ansible.builtin.systemd_service:
    name: nginx
    enabled: true
    state: started
