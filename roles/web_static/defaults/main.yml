---
web_static_environment: prod
web_static_root: /var/www
web_static_assets_root: "{{ web_static_root }}/assets"
web_static_source_root: "{{ playbook_dir }}/../files/static-sites"

web_static_certbot_email: jsmith@grayhavensystems.com
web_static_certbot_environment: staging
web_static_certbot_credentials_file: /etc/letsencrypt/digitalocean.ini
web_static_certbot_dns_token_file: /etc/grayhaven/ansible/secrets/digitalocean-dns-api-token
web_static_dev_htpasswd_source: /etc/grayhaven/ansible/secrets/dev-basic-auth-htpasswd
web_static_dev_htpasswd_file: /etc/nginx/grayhaven-dev.htpasswd

web_static_packages:
  - certbot
  - nginx
  - python3-certbot-dns-digitalocean
  - python3-certbot-nginx

web_static_sites:
  - domain: grayhavensystems.com
    aliases:
      - www.grayhavensystems.com
    dev_domain: dev.grayhavensystems.com
    cert_name: grayhavensystems.com
    auth_realm: grayhavensystems.com Development Environment

  - domain: jerry-smith.net
    aliases:
      - www.jerry-smith.net
    dev_domain: dev.jerry-smith.net
    cert_name: jerry-smith.net
    auth_realm: jerry-smith.net Development Environment
