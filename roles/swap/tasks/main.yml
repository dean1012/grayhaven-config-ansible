---
- name: Check active swap devices
  ansible.builtin.command:
    cmd: swapon --show=NAME --noheadings
  register: swap_active_devices
  changed_when: false

- name: Create managed swapfile
  ansible.builtin.command:
    cmd: "fallocate -l {{ swapfile_size }} {{ swapfile_path }}"
    creates: "{{ swapfile_path }}"

- name: Secure managed swapfile permissions
  ansible.builtin.file:
    path: "{{ swapfile_path }}"
    owner: root
    group: root
    mode: "0600"

- name: Format managed swapfile
  ansible.builtin.command:
    cmd: "mkswap {{ swapfile_path }}"
  when: swapfile_path not in swap_active_devices.stdout_lines

- name: Enable managed swapfile
  ansible.builtin.command:
    cmd: "swapon {{ swapfile_path }}"
  when: swapfile_path not in swap_active_devices.stdout_lines

- name: Persist managed swapfile
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^{{ swapfile_path | regex_escape }}\\s+"
    line: "{{ swapfile_path }} none swap sw 0 0"
    state: present
