---
- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Install local hosts file
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"

- name: Build bastion SSH known-host scan targets
  ansible.builtin.set_fact:
    host_identity_known_host_scan_targets: >-
      {%- set targets = [] -%}
      {%- for managed_host in managed_inventory_hosts | default([]) -%}
      {%- if managed_host.fqdn != inventory_hostname and managed_host.private_ip | default('') | string | length > 0 -%}
      {%- set managed_host_aliases = [managed_host.host_alias, managed_host.host_alias ~ '.internal'] -%}
      {%- set _ = targets.extend(managed_host_aliases + [managed_host.private_ip]) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ targets | unique | list }}
  when: grayhaven_role == "bastion"

- name: Scan managed host SSH keys from bastion
  ansible.builtin.command:
    cmd: >-
      ssh-keyscan -T 5 -t ed25519
      {{ host_identity_known_host_scan_targets | map('quote') | join(' ') }}
  register: host_identity_known_host_scan
  changed_when: false
  when:
    - grayhaven_role == "bastion"
    - host_identity_known_host_scan_targets | default([]) | length > 0

- name: Normalize managed host SSH keys from bastion
  ansible.builtin.set_fact:
    host_identity_known_host_keys: >-
      {{
        host_identity_known_host_scan.stdout_lines
        | reject('match', '^#')
        | reject('equalto', '')
        | unique
        | sort
        | list
      }}
  when:
    - grayhaven_role == "bastion"
    - host_identity_known_host_scan_targets | default([]) | length > 0

- name: Validate managed host SSH key scan from bastion
  ansible.builtin.assert:
    that:
      - host_identity_known_host_keys | default([]) | length == host_identity_known_host_scan_targets | length
    fail_msg: "Managed host SSH key scan did not return one key line for each expected target."
    quiet: true
  when:
    - grayhaven_role == "bastion"
    - host_identity_known_host_scan_targets | default([]) | length > 0

- name: Install managed global SSH known hosts on bastion
  ansible.builtin.copy:
    dest: /etc/ssh/ssh_known_hosts
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible. Do not edit manually.
      {% for host_identity_known_host_key in host_identity_known_host_keys %}
      {{ host_identity_known_host_key }}
      {% endfor %}
  when:
    - grayhaven_role == "bastion"
    - host_identity_known_host_scan_targets | default([]) | length > 0

- name: Remove temporary first-convergence Ansible SSH known hosts on bastion
  ansible.builtin.file:
    path: /home/ansible/.ssh/known_hosts
    state: absent
  when: grayhaven_role == "bastion"

- name: Create local Ansible facts directory
  ansible.builtin.file:
    path: /etc/ansible/facts.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Publish Grayhaven Systems LLC local host facts
  ansible.builtin.copy:
    dest: /etc/ansible/facts.d/grayhaven.fact
    owner: root
    group: root
    mode: "0644"
    content: "{{ host_identity_local_fact | to_nice_json }}\n"
  vars:
    host_identity_local_fact:
      environment: "{{ grayhaven_environment }}"
      hostname: "{{ inventory_hostname }}"
      role: "{{ grayhaven_role }}"
      control_node: "{{ automation_runner_host_is_control_node }}"
      tls_mode: "{{ grayhaven_tls_mode | default('host') }}"
      certificate_environment: "{{ grayhaven_certificate_environment | default('staging') }}"
      tags: "{{ do_tags | default([]) | sort }}"
      private_ipv4: "{{ grayhaven_private_ipv4 | default('') }}"
      public_ipv4: "{{ grayhaven_public_ipv4 | default('') }}"
    automation_runner_host_is_control_node: "{{ 'control-node' in (do_tags | default([])) }}"

- name: Install login issue banner
  ansible.builtin.template:
    src: issue.j2
    dest: /etc/issue
    owner: root
    group: root
    mode: "0644"

- name: Install managed shell prompt policy
  ansible.builtin.template:
    src: grayhaven-prompt.sh.j2
    dest: /etc/profile.d/grayhaven-prompt.sh
    owner: root
    group: root
    mode: "0644"

- name: Install managed shell editor policy
  ansible.builtin.template:
    src: grayhaven-editor.sh.j2
    dest: /etc/profile.d/grayhaven-editor.sh
    owner: root
    group: root
    mode: "0644"
