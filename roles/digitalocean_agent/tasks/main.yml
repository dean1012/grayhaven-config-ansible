---
- name: Stop and disable DigitalOcean Droplet agent
  ansible.builtin.service:
    name: droplet-agent
    state: stopped
    enabled: false
  failed_when: false

- name: Remove DigitalOcean Droplet agent package
  ansible.builtin.dnf:
    name: droplet-agent
    state: absent

- name: Remove DigitalOcean Droplet agent state directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/droplet-agent
    - /var/log/droplet-agent

- name: Import DigitalOcean metrics agent repository GPG key
  ansible.builtin.rpm_key:
    key: https://repos.insights.digitalocean.com/sonar-agent.asc
    state: present

- name: Configure DigitalOcean metrics agent repository
  ansible.builtin.yum_repository:
    name: sonar
    description: DigitalOcean metrics agent
    baseurl: https://repos.insights.digitalocean.com/yum/do-agent/$basearch
    enabled: true
    gpgcheck: true
    gpgkey: https://repos.insights.digitalocean.com/sonar-agent.asc

- name: Install DigitalOcean metrics agent package
  ansible.builtin.dnf:
    name: do-agent
    state: present

- name: Enable and start DigitalOcean metrics agent
  ansible.builtin.service:
    name: do-agent
    state: started
    enabled: true
