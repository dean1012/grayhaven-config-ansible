---
- name: Validate grayhaven-backupctl checkout path
  ansible.builtin.assert:
    that:
      - backupctl_checkout_dir is string
      - backupctl_checkout_dir is match('^/home/ansible/.+')
      - backupctl_checkout_dir != '/home/ansible'
    fail_msg: "grayhaven-backupctl checkout directory must be below /home/ansible."
    quiet: true

- name: Ensure grayhaven-backupctl state directory exists
  ansible.builtin.file:
    path: "{{ backupctl_state_dir }}"
    state: directory
    owner: ansible
    group: ansible
    mode: "0755"

- name: Check previous grayhaven-backupctl checkout marker
  ansible.builtin.stat:
    path: "{{ backupctl_state_dir }}/checkout-dir"
  register: backupctl_checkout_marker

- name: Read previous grayhaven-backupctl checkout marker
  ansible.builtin.slurp:
    src: "{{ backupctl_state_dir }}/checkout-dir"
  register: backupctl_previous_checkout_marker
  when: backupctl_checkout_marker.stat.exists

- name: Derive previous grayhaven-backupctl checkout path
  ansible.builtin.set_fact:
    backupctl_previous_checkout_dir: >-
      {{
        (
          backupctl_previous_checkout_marker.content
          | default('')
          | b64decode
          | trim
        )
      }}

- name: Remove previous grayhaven-backupctl checkout when path changes
  ansible.builtin.file:
    path: "{{ backupctl_previous_checkout_dir }}"
    state: absent
  when:
    - backupctl_previous_checkout_dir | length > 0
    - backupctl_previous_checkout_dir != backupctl_checkout_dir
    - backupctl_previous_checkout_dir is match('^/home/ansible/.+')
    - backupctl_previous_checkout_dir != '/home/ansible'

- name: Check existing grayhaven-backupctl checkout
  ansible.builtin.stat:
    path: "{{ backupctl_checkout_dir }}/.git"
  register: backupctl_existing_checkout

- name: Read existing grayhaven-backupctl origin URL
  ansible.builtin.command:
    cmd: git -C "{{ backupctl_checkout_dir }}" config --get remote.origin.url
  become: true
  become_user: ansible
  environment:
    HOME: /home/ansible
    USER: ansible
    LOGNAME: ansible
  register: backupctl_existing_origin
  changed_when: false
  failed_when: false
  when: backupctl_existing_checkout.stat.exists

- name: Remove grayhaven-backupctl checkout when origin URL changes
  ansible.builtin.file:
    path: "{{ backupctl_checkout_dir }}"
    state: absent
  when:
    - backupctl_existing_checkout.stat.exists
    - backupctl_existing_origin.stdout | default('') | trim != backupctl_repo_url

- name: Check out grayhaven-backupctl
  ansible.builtin.git:
    repo: "{{ backupctl_repo_url }}"
    dest: "{{ backupctl_checkout_dir }}"
    version: "{{ backupctl_repo_ref }}"
    force: true
    update: true
  become: true
  become_user: ansible
  environment:
    HOME: /home/ansible
    USER: ansible
    LOGNAME: ansible

- name: Create grayhaven-backupctl virtual environment
  ansible.builtin.command:
    cmd: >-
      /usr/bin/python3 -m venv
      --system-site-packages
      {{ backupctl_venv_dir | quote }}
    creates: "{{ backupctl_venv_dir }}/bin/python"

- name: Install grayhaven-backupctl Python requirements
  ansible.builtin.pip:
    virtualenv: "{{ backupctl_venv_dir }}"
    requirements: "{{ backupctl_checkout_dir }}/requirements.txt"
    extra_args: --require-hashes

- name: Ensure grayhaven-backupctl libexec directory exists
  ansible.builtin.file:
    path: "{{ backupctl_libexec_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install grayhaven-backupctl implementation
  ansible.builtin.copy:
    src: "{{ backupctl_checkout_dir }}/grayhaven-backupctl"
    dest: "{{ backupctl_libexec_dir }}/grayhaven-backupctl"
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Install grayhaven-backupctl command wrapper
  ansible.builtin.copy:
    dest: "{{ backupctl_command_path }}"
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -Eeuo pipefail
      PYTHON={{ (backupctl_venv_dir ~ '/bin/python') | quote }}
      BACKUPCTL={{ (backupctl_libexec_dir ~ '/grayhaven-backupctl') | quote }}
      exec "$PYTHON" "$BACKUPCTL" "$@"

- name: Generate grayhaven-backupctl bash completion
  ansible.builtin.command:
    cmd: "{{ backupctl_command_path }} completion bash"
  register: backupctl_completion
  changed_when: false

- name: Install grayhaven-backupctl bash completion
  ansible.builtin.copy:
    dest: /etc/bash_completion.d/grayhaven-backupctl
    owner: root
    group: root
    mode: "0644"
    content: "{{ backupctl_completion.stdout }}\n"

- name: Store grayhaven-backupctl checkout marker
  ansible.builtin.copy:
    dest: "{{ backupctl_state_dir }}/checkout-dir"
    owner: ansible
    group: ansible
    mode: "0644"
    content: "{{ backupctl_checkout_dir }}\n"
