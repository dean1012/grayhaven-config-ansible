---
- name: Set root password hash
  ansible.builtin.user:
    name: root
    password: "{{ root_password_hash }}"
  no_log: true

- name: Remove root authorized SSH keys
  ansible.builtin.file:
    path: /root/.ssh/authorized_keys
    state: absent

- name: Configure base automation user access
  ansible.builtin.import_tasks: base.yml

- name: Configure sudo command lookup path
  ansible.builtin.import_tasks: sudo-path.yml

- name: Add vault Ansible control key before controller handoff
  ansible.posix.authorized_key:
    user: ansible
    key: "{{ ansible_control_public_key | trim }}"
    state: present
    exclusive: false
  no_log: true

- name: Install vault Ansible control private key on bastion hosts
  ansible.builtin.copy:
    dest: /home/ansible/.ssh/id_ed25519
    owner: ansible
    group: ansible
    mode: "0600"
    content: "{{ ansible_control_private_key | trim }}\n"
  when: grayhaven_role == "bastion"
  no_log: true

- name: Install vault Ansible control public key on bastion hosts
  ansible.builtin.copy:
    dest: /home/ansible/.ssh/id_ed25519.pub
    owner: ansible
    group: ansible
    mode: "0644"
    content: "{{ ansible_control_public_key | trim }}\n"
  when: grayhaven_role == "bastion"
  no_log: true

- name: Reset SSH connection after Ansible control key handoff
  ansible.builtin.meta: reset_connection

- name: Verify fresh SSH after Ansible control key handoff
  ansible.builtin.wait_for_connection:
    delay: 1
    sleep: 2
    timeout: 60
  when: ansible_connection | default("ssh") != "local"

- name: Enforce vault Ansible control authorized key on managed hosts
  ansible.builtin.copy:
    dest: /home/ansible/.ssh/authorized_keys
    owner: ansible
    group: ansible
    mode: "0600"
    content: "{{ ansible_control_public_key | trim }}\n"
  no_log: true
