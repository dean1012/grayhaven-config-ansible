---
- name: Create ansible runtime cache directory
  ansible.builtin.file:
    path: /home/ansible/.ansible
    state: directory
    owner: ansible
    group: ansible
    mode: "0750"
  when: grayhaven_role == "bastion"

- name: Create ansible runner workspace directory
  ansible.builtin.file:
    path: "{{ automation_runner_workspace_dir }}"
    state: directory
    owner: ansible
    group: ansible
    mode: "0750"
  when: grayhaven_role == "bastion"

- name: Create Grayhaven Systems LLC state directory
  ansible.builtin.file:
    path: /var/lib/grayhaven
    state: directory
    owner: ansible
    group: ansible
    mode: "0755"
  when: grayhaven_role == "bastion"

- name: Create ansible poller state directory
  ansible.builtin.file:
    path: /var/lib/grayhaven/ansible-poller
    state: directory
    owner: ansible
    group: ansible
    mode: "0755"
  when: grayhaven_role == "bastion"

- name: Install ansible runner runtime tmpfiles rule
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/grayhaven-ansible-runner.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      d /run/grayhaven-ansible-runner 0750 ansible ansible -
  when: grayhaven_role == "bastion"

- name: Create ansible runner runtime directory
  ansible.builtin.command:
    cmd: systemd-tmpfiles --create /etc/tmpfiles.d/grayhaven-ansible-runner.conf
  changed_when: false
  when: grayhaven_role == "bastion"
