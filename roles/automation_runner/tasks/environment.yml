---
- name: Store bastion runner environment
  ansible.builtin.copy:
    dest: /etc/grayhaven/ansible/runner.env
    owner: root
    group: ansible
    mode: "0640"
    content: |
      REPO_URL={{ automation_runner_effective_repo_url | quote }}
      REPO_REF={{ automation_runner_effective_config_repo_ref | quote }}
      CHECKOUT_DIR={{ automation_runner_effective_checkout_dir | quote }}
      VAULT_REPO_URL={{ automation_runner_effective_vault_repo_url | quote }}
      VAULT_REPO_REF={{ automation_runner_effective_vault_repo_ref | quote }}
      VAULT_CHECKOUT_DIR={{ automation_runner_effective_vault_checkout_dir | quote }}
      GRAYHAVEN_ENVIRONMENT={{ automation_runner_effective_environment | quote }}
      GRAYHAVEN_HOSTNAME={{ automation_runner_effective_hostname | quote }}
      GRAYHAVEN_IS_CONTROL_NODE={{ automation_runner_effective_control_node_string | quote }}
      GRAYHAVEN_CERTIFICATE_ENVIRONMENT={{ automation_runner_effective_certificate_environment | quote }}
      GRAYHAVEN_TLS_MODE={{ automation_runner_effective_tls_mode | quote }}
  when: grayhaven_role == "bastion"
  vars:
    automation_runner_effective_repo_url: >-
      {{ automation_runner_bootstrap_repo_url | default(automation_runner_repo_url) }}
    automation_runner_effective_config_repo_ref: >-
      {{
        automation_runner_bootstrap_config_repo_ref
        | default(automation_runner_config_repo_ref | default('main'))
      }}
    automation_runner_effective_checkout_dir: >-
      {{ automation_runner_bootstrap_checkout_dir | default(automation_runner_checkout_dir) }}
    automation_runner_effective_vault_repo_url: >-
      {{
        automation_runner_bootstrap_vault_repo_url
        | default(
            automation_runner_vault_repo_url
            | default('git@github.com:dean1012/grayhaven-vault.git')
          )
      }}
    automation_runner_effective_vault_repo_ref: >-
      {{
        automation_runner_bootstrap_vault_repo_ref
        | default('main' if grayhaven_environment == 'prod' else 'staging')
      }}
    automation_runner_effective_vault_checkout_dir: >-
      {{
        automation_runner_bootstrap_vault_checkout_dir
        | default(grayhaven_vault_checkout_dir | default('/home/ansible/grayhaven-vault'))
      }}
    automation_runner_effective_environment: "{{ grayhaven_environment }}"
    automation_runner_effective_hostname: >-
      {{ automation_runner_bootstrap_hostname | default(inventory_hostname) }}
    automation_runner_effective_is_control_node: >-
      {{
        automation_runner_bootstrap_is_control_node
        | default('control-node' in (do_tags | default([])))
        | bool
      }}
    automation_runner_effective_control_node_string: >-
      {{ (automation_runner_effective_is_control_node | bool) | ternary('true', 'false') }}
    automation_runner_effective_certificate_environment: >-
      {{
        automation_runner_bootstrap_certificate_environment
        | default(grayhaven_certificate_environment | default('staging'))
      }}
    automation_runner_effective_tls_mode: >-
      {{ automation_runner_bootstrap_tls_mode | default(grayhaven_tls_mode | default('host')) }}
