---
- name: Apply Grayhaven Systems LLC base configuration
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Wait for managed hosts to accept Ansible connections
      ansible.builtin.wait_for_connection:
        delay: 5
        sleep: 10
        timeout: 300

    - name: Gather facts after managed hosts are reachable
      ansible.builtin.setup:

    - name: Build Discord notification target order
      ansible.builtin.set_fact:
        automation_notifications_targets: >-
          {{
            (
              groups.get('tag_role_bastion', [])
              | intersect(ansible_play_hosts_all)
              | sort
            )
            + (
              groups.get('tag_role_web', [])
              | intersect(ansible_play_hosts_all)
              | sort
            )
            + (
              ansible_play_hosts_all
              | difference(
                  groups.get('tag_role_bastion', [])
                  + groups.get('tag_role_web', [])
                )
              | sort
            )
          }}
      run_once: true

    - name: Notify Discord that configuration started
      ansible.builtin.include_role:
        name: automation_notifications
      vars:
        automation_notifications_target: "{{ automation_notifications_targets | join('\n') }}"
        automation_notifications_title: Ansible Configuration Started
        automation_notifications_color: "{{ automation_notifications_colors.info }}"
      run_once: true

  roles:
    - managed_baseline
    - admin_access
    - web_static
    - observability

  post_tasks:
    - name: Refresh reboot status after convergence
      ansible.builtin.include_role:
        name: managed_baseline
        tasks_from: reboot-status

    - name: Refresh message of the day after convergence
      ansible.builtin.include_role:
        name: managed_baseline
        tasks_from: motd

    - name: Check for active AlmaLinux bootstrap user processes
      ansible.builtin.command:
        cmd: pgrep -u almalinux
      register: grayhaven_almalinux_processes
      changed_when: false
      failed_when: false

    - name: Remove bootstrap AlmaLinux user after successful convergence
      ansible.builtin.user:
        name: almalinux
        state: absent
        remove: true
      when: grayhaven_almalinux_processes.rc != 0

    - name: Build Discord successful host target order
      ansible.builtin.set_fact:
        automation_notifications_success_targets: >-
          {{
            (
              groups.get('tag_role_bastion', [])
              | intersect(ansible_play_hosts)
              | sort
            )
            + (
              groups.get('tag_role_web', [])
              | intersect(ansible_play_hosts)
              | sort
            )
            + (
              ansible_play_hosts
              | difference(
                  groups.get('tag_role_bastion', [])
                  + groups.get('tag_role_web', [])
                )
              | sort
            )
          }}
      run_once: true

    - name: Notify Discord that configuration completed
      ansible.builtin.include_role:
        name: automation_notifications
      vars:
        automation_notifications_reboot_required: >-
          {{
            automation_notifications_success_targets
            | map('extract', hostvars, 'managed_baseline_reboot_required')
            | select('defined')
            | select('equalto', true)
            | list
            | length > 0
          }}
        automation_notifications_target: "{{ automation_notifications_success_targets | join('\n') }}"
        automation_notifications_title: >-
          {{
            'Ansible Configuration Completed - Reboot Required'
            if automation_notifications_reboot_required
            else 'Ansible Configuration Completed'
          }}
        automation_notifications_color: >-
          {{
            automation_notifications_colors.warning
            if automation_notifications_reboot_required
            else automation_notifications_colors.success
          }}
      run_once: true
