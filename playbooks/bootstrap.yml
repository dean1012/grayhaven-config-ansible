---
- name: Bootstrap first-boot host access
  hosts: localhost
  vars:
    ansible_python_interpreter: "/usr/bin/python3"
  connection: local
  become: true

  tasks:
    - name: Validate common bootstrap variables
      ansible.builtin.assert:
        that:
          - grayhaven_hostname is defined
          - grayhaven_hostname is string
          - grayhaven_hostname | trim | length > 0
          - grayhaven_role is defined
          - grayhaven_role is string
          - grayhaven_role in ["bastion", "web"]
          - grayhaven_environment is defined
          - grayhaven_environment is string
          - grayhaven_environment in ["staging", "prod"]
          - grayhaven_certbot_environment is not defined or grayhaven_certbot_environment in ["staging", "production"]
          - grayhaven_config_repo_ref is defined
          - grayhaven_config_repo_ref is string
          - grayhaven_config_repo_ref | trim | length > 0
          - grayhaven_root_password_hash is defined
          - grayhaven_root_password_hash is string
          - grayhaven_root_password_hash | trim | length > 0
        fail_msg: "Required common bootstrap variables were not provided correctly by the OpenTofu/cloud-init handoff."
        quiet: true
      no_log: true

    - name: Validate bastion bootstrap variables
      ansible.builtin.assert:
        that:
          - grayhaven_ansible_control_private_key is defined
          - grayhaven_ansible_control_private_key is string
          - grayhaven_ansible_control_private_key | trim | length > 0
          - grayhaven_discord_webhook_url is defined
          - grayhaven_discord_webhook_url is string
          - grayhaven_discord_webhook_url | trim | length > 0
          - grayhaven_digitalocean_inventory_api_token is defined
          - grayhaven_digitalocean_inventory_api_token is string
          - grayhaven_digitalocean_inventory_api_token | trim | length > 0
          - grayhaven_jsmith_password_hash is defined
          - grayhaven_jsmith_password_hash is string
          - grayhaven_jsmith_password_hash | trim | length > 0
          - grayhaven_jsmith_public_key is defined
          - grayhaven_jsmith_public_key is string
          - grayhaven_jsmith_public_key | trim | length > 0
        fail_msg: "Required bastion bootstrap variables were not provided correctly by the OpenTofu/cloud-init handoff."
        quiet: true
      no_log: true
      when: grayhaven_role == "bastion"

    - name: Validate web bootstrap variables
      ansible.builtin.assert:
        that:
          - grayhaven_ansible_control_public_key is defined
          - grayhaven_ansible_control_public_key is string
          - grayhaven_ansible_control_public_key | trim | length > 0
          - grayhaven_dev_basic_auth_htpasswd_line is defined
          - grayhaven_dev_basic_auth_htpasswd_line is string
          - grayhaven_dev_basic_auth_htpasswd_line | trim | length > 0
          - grayhaven_digitalocean_dns_api_token is defined
          - grayhaven_digitalocean_dns_api_token is string
          - grayhaven_digitalocean_dns_api_token | trim | length > 0
        fail_msg: "Required web bootstrap variables were not provided correctly by the OpenTofu/cloud-init handoff."
        quiet: true
      no_log: true
      when: grayhaven_role == "web"

    - name: Set system hostname
      ansible.builtin.hostname:
        name: "{{ grayhaven_hostname }}"

    - name: Check active swap devices
      ansible.builtin.command:
        cmd: swapon --show=NAME --noheadings
      register: grayhaven_bootstrap_active_swap
      changed_when: false

    - name: Create bootstrap swapfile
      ansible.builtin.command:
        cmd: fallocate -l 1G /swapfile
        creates: /swapfile

    - name: Secure bootstrap swapfile permissions
      ansible.builtin.file:
        path: /swapfile
        owner: root
        group: root
        mode: "0600"

    - name: Format bootstrap swapfile
      ansible.builtin.command:
        cmd: mkswap /swapfile
      when: "'/swapfile' not in grayhaven_bootstrap_active_swap.stdout_lines"

    - name: Enable bootstrap swapfile
      ansible.builtin.command:
        cmd: swapon /swapfile
      when: "'/swapfile' not in grayhaven_bootstrap_active_swap.stdout_lines"

    - name: Persist bootstrap swapfile
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^/swapfile\s+'
        line: /swapfile none swap sw 0 0
        state: present

    - name: Create ansible automation user
      ansible.builtin.user:
        name: ansible
        comment: Grayhaven Systems LLC automation user
        create_home: true
        shell: /bin/bash
        password_lock: true
        state: present

    - name: Grant ansible passwordless sudo
      ansible.builtin.copy:
        dest: /etc/sudoers.d/ansible
        owner: root
        group: root
        mode: "0440"
        content: |
          ansible ALL=(ALL) NOPASSWD: ALL
        validate: /usr/sbin/visudo -cf %s

    - name: Create ansible SSH directory
      ansible.builtin.file:
        path: /home/ansible/.ssh
        state: directory
        owner: ansible
        group: ansible
        mode: "0700"

    - name: Install Ansible control public key on web hosts
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/authorized_keys
        owner: ansible
        group: ansible
        mode: "0600"
        content: "{{ grayhaven_ansible_control_public_key }}\n"
      when: grayhaven_role == "web"

    - name: Install Ansible control private key on bastion hosts
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/id_ed25519
        owner: ansible
        group: ansible
        mode: "0600"
        content: "{{ grayhaven_ansible_control_private_key }}\n"
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Create Grayhaven secrets directory
      ansible.builtin.file:
        path: /etc/grayhaven/ansible/secrets
        state: directory
        owner: root
        group: ansible
        mode: "0750"

    - name: Store Discord webhook environment file on bastion hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/discord-webhook.env
        owner: root
        group: ansible
        mode: "0640"
        content: |
          DISCORD_WEBHOOK_URL={{ grayhaven_discord_webhook_url | quote }}
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Store DigitalOcean inventory API token on bastion hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/do-api-token.env
        owner: root
        group: ansible
        mode: "0640"
        content: |
          DO_API_TOKEN={{ grayhaven_digitalocean_inventory_api_token | quote }}
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Store admin access vars on bastion hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/admin-access.yml
        owner: root
        group: ansible
        mode: "0640"
        content: |
          admin_access_password_hash: {{ grayhaven_jsmith_password_hash | to_json }}
          admin_access_public_key: {{ grayhaven_jsmith_public_key | to_json }}
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Store managed baseline vars on bastion hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/managed-baseline.yml
        owner: root
        group: ansible
        mode: "0640"
        content: |
          managed_baseline_root_password_hash: {{ grayhaven_root_password_hash | to_json }}
          managed_baseline_config_repo_ref: {{ grayhaven_config_repo_ref | to_json }}
          managed_baseline_environment: {{ grayhaven_environment | to_json }}
          web_static_environment: {{ grayhaven_environment | to_json }}
          web_static_certbot_environment_override: {{ grayhaven_certbot_environment | default('') | to_json }}
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Store dev HTTP basic auth htpasswd entry on web hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/dev-basic-auth-htpasswd
        owner: root
        group: root
        mode: "0600"
        content: "{{ grayhaven_dev_basic_auth_htpasswd_line }}\n"
      when: grayhaven_role == "web"
      no_log: true

    - name: Store DigitalOcean DNS API token on web hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/digitalocean-dns-api-token
        owner: root
        group: root
        mode: "0600"
        content: "{{ grayhaven_digitalocean_dns_api_token }}\n"
      when: grayhaven_role == "web"
      no_log: true

    - name: Set root password hash
      ansible.builtin.user:
        name: root
        password: "{{ grayhaven_root_password_hash }}"
      no_log: true

    - name: Remove root authorized SSH keys
      ansible.builtin.file:
        path: /root/.ssh/authorized_keys
        state: absent

    - name: Stop and disable DigitalOcean Droplet agent
      ansible.builtin.service:
        name: droplet-agent
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove DigitalOcean Droplet agent package
      ansible.builtin.dnf:
        name: droplet-agent
        state: absent

    - name: Remove DigitalOcean Droplet agent configuration directory
      ansible.builtin.file:
        path: /etc/droplet-agent
        state: absent

    - name: Remove DigitalOcean Droplet agent log directory
      ansible.builtin.file:
        path: /var/log/droplet-agent
        state: absent

    - name: Install bastion runner OS dependencies
      ansible.builtin.dnf:
        name:
          - git
          - python3-pip
        state: present
      when: grayhaven_role == "bastion"

    - name: Store bastion runner environment
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/runner.env
        owner: root
        group: ansible
        mode: "0640"
        content: |
          REPO_URL={{ "https://github.com/dean1012/grayhaven-config-ansible.git" | quote }}
          REPO_REF={{ grayhaven_config_repo_ref | quote }}
          CHECKOUT_DIR={{ "/home/ansible/grayhaven-config-ansible" | quote }}
          GRAYHAVEN_ENVIRONMENT={{ grayhaven_environment | quote }}
      when: grayhaven_role == "bastion"

    - name: Install bastion runner executable
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/grayhaven-ansible-runner"
        dest: /usr/local/sbin/grayhaven-ansible-runner
        owner: root
        group: root
        mode: "0755"
      when: grayhaven_role == "bastion"

    - name: Install bastion runner service unit
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/systemd/grayhaven-ansible-runner.service"
        dest: /etc/systemd/system/grayhaven-ansible-runner.service
        owner: root
        group: root
        mode: "0644"
      when: grayhaven_role == "bastion"

    - name: Install bastion runner timer unit
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/systemd/grayhaven-ansible-runner.timer"
        dest: /etc/systemd/system/grayhaven-ansible-runner.timer
        owner: root
        group: root
        mode: "0644"
      when: grayhaven_role == "bastion"

    - name: Enable bastion runner timer
      ansible.builtin.systemd_service:
        name: grayhaven-ansible-runner.timer
        enabled: true
        state: started
        daemon_reload: true
      when: grayhaven_role == "bastion"

    - name: Trigger initial bastion runner execution without blocking bootstrap
      ansible.builtin.command:
        cmd: systemctl start --no-block grayhaven-ansible-runner.service
      changed_when: true
      when: grayhaven_role == "bastion"
