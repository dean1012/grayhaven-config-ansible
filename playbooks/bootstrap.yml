---
- name: Bootstrap first-boot host access
  hosts: localhost
  vars:
    ansible_python_interpreter: "/usr/bin/python3"
  connection: local
  become: true

  tasks:
    # Validate the OpenTofu/cloud-init handoff before any persistent host
    # changes are made. Most values are no_log because bootstrap variables can
    # include deploy keys and vault material on bastion hosts.
    - name: Validate common bootstrap variables
      ansible.builtin.assert:
        that:
          - grayhaven_hostname is defined
          - grayhaven_hostname is string
          - grayhaven_hostname | trim | length > 0
          - grayhaven_role is defined
          - grayhaven_role is string
          - grayhaven_role in ["bastion", "web"]
          - grayhaven_environment is defined
          - grayhaven_environment is string
          - grayhaven_environment in ["staging", "prod"]
          - grayhaven_config_repo_ref is defined
          - grayhaven_config_repo_ref is string
          - grayhaven_config_repo_ref | trim | length > 0
          - grayhaven_ansible_deploy_public_key is defined
          - grayhaven_ansible_deploy_public_key is string
          - grayhaven_ansible_deploy_public_key | trim | length > 0
          - grayhaven_certificate_environment is defined
          - grayhaven_certificate_environment in ["staging", "production"]
          - grayhaven_tls_mode is defined
          - grayhaven_tls_mode in ["host", "load_balancer"]
        fail_msg: "Required common bootstrap variables were not provided correctly by the OpenTofu/cloud-init handoff."
        quiet: true
      no_log: true

    - name: Validate bastion bootstrap variables
      ansible.builtin.assert:
        that:
          - grayhaven_is_control_node is defined
          - grayhaven_is_control_node is boolean
          - grayhaven_control_bastion_key is defined
          - grayhaven_control_bastion_key is string
          - grayhaven_control_bastion_key | trim | length > 0
          - grayhaven_vault_repo_url is defined
          - grayhaven_vault_repo_url is string
          - grayhaven_vault_repo_url | trim | length > 0
          - grayhaven_vault_repo_ref is defined
          - grayhaven_vault_repo_ref is string
          - grayhaven_vault_repo_ref | trim | length > 0
          - grayhaven_vault_password is defined
          - grayhaven_vault_password is string
          - grayhaven_vault_password | length > 0
          - grayhaven_ansible_deploy_private_key is defined
          - grayhaven_ansible_deploy_private_key is string
          - grayhaven_ansible_deploy_private_key | trim | length > 0
        fail_msg: "Required bastion bootstrap variables were not provided correctly by the OpenTofu/cloud-init handoff."
        quiet: true
      no_log: true
      when: grayhaven_role == "bastion"

    # First boot needs enough local baseline state to let the full runner take
    # over reliably, even on small droplets. These role task files are limited
    # to bootstrap-safe local work and do not depend on vault or dynamic
    # inventory.
    - name: Configure bootstrap hostname
      ansible.builtin.include_role:
        name: host_identity
        tasks_from: hostname
      vars:
        host_identity_hostname: "{{ grayhaven_hostname }}"

    - name: Configure bootstrap swap
      ansible.builtin.include_role:
        name: swap

    - name: Configure bootstrap automation user access
      ansible.builtin.include_role:
        name: automation_user
        tasks_from: base

    - name: Create temporary first-convergence SSH known hosts file on bastion hosts
      ansible.builtin.file:
        path: /home/ansible/.ssh/known_hosts
        state: touch
        owner: ansible
        group: ansible
        mode: "0644"
        modification_time: preserve
        access_time: preserve
      when: grayhaven_role == "bastion"

    - name: Prepare bootstrap runner directories
      ansible.builtin.include_role:
        name: automation_runner
        tasks_from: directories
      when: grayhaven_role == "bastion"

    - name: Install Ansible authorized key
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/authorized_keys
        owner: ansible
        group: ansible
        mode: "0600"
        content: "{{ grayhaven_ansible_deploy_public_key | trim }}\n"

    - name: Install bootstrap vault deploy private key on bastion hosts
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/grayhaven_vault_deploy_key
        owner: ansible
        group: ansible
        mode: "0600"
        content: "{{ grayhaven_ansible_deploy_private_key | trim }}\n"
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Install bootstrap vault deploy public key on bastion hosts
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/grayhaven_vault_deploy_key.pub
        owner: ansible
        group: ansible
        mode: "0644"
        content: "{{ grayhaven_ansible_deploy_public_key | trim }}\n"
      when: grayhaven_role == "bastion"

    # The id_ed25519 bootstrap copy is temporary first-boot access. Full
    # convergence replaces it with the vault-defined Ansible control key.
    - name: Install temporary bootstrap Ansible control private key on bastion hosts
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/id_ed25519
        owner: ansible
        group: ansible
        mode: "0600"
        content: "{{ grayhaven_ansible_deploy_private_key | trim }}\n"
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Install temporary bootstrap Ansible control public key on bastion hosts
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/id_ed25519.pub
        owner: ansible
        group: ansible
        mode: "0644"
        content: "{{ grayhaven_ansible_deploy_public_key | trim }}\n"
      when: grayhaven_role == "bastion"

    - name: Create Grayhaven Systems LLC secrets directory
      ansible.builtin.file:
        path: /etc/grayhaven/ansible/secrets
        state: directory
        owner: root
        group: ansible
        mode: "0750"

    - name: Store Ansible Vault password on bastion hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/vault-password
        owner: root
        group: ansible
        mode: "0640"
        content: "{{ grayhaven_vault_password }}"
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Remove legacy DigitalOcean Droplet agent during bootstrap
      ansible.builtin.include_role:
        name: digitalocean_agent
        tasks_from: remove-droplet-agent

    # Bootstrap installs only the packages needed to fetch and run the full
    # convergence runner. Normal convergence owns full package state.
    - name: Install bootstrap runner OS dependencies
      ansible.builtin.include_role:
        name: system_packages
        tasks_from: bootstrap-runner
      when: grayhaven_role == "bastion"

    - name: Store bastion runner environment
      ansible.builtin.include_role:
        name: automation_runner
        tasks_from: environment
      vars:
        automation_runner_bootstrap_repo_url: https://github.com/dean1012/grayhaven-config-ansible.git
        automation_runner_bootstrap_config_repo_ref: "{{ grayhaven_config_repo_ref }}"
        automation_runner_bootstrap_checkout_dir: /home/ansible/grayhaven-config-ansible
        automation_runner_bootstrap_vault_repo_url: "{{ grayhaven_vault_repo_url }}"
        automation_runner_bootstrap_vault_repo_ref: "{{ grayhaven_vault_repo_ref }}"
        automation_runner_bootstrap_vault_checkout_dir: /home/ansible/grayhaven-vault
        automation_runner_bootstrap_hostname: "{{ grayhaven_hostname }}"
        automation_runner_bootstrap_is_control_node: "{{ grayhaven_is_control_node | bool }}"
        automation_runner_bootstrap_certificate_environment: "{{ grayhaven_certificate_environment }}"
        automation_runner_bootstrap_tls_mode: "{{ grayhaven_tls_mode }}"
      when: grayhaven_role == "bastion"

    - name: Install bootstrap runner files
      ansible.builtin.include_role:
        name: automation_runner
        tasks_from: install
      when: grayhaven_role == "bastion"

    - name: Manage bootstrap runner timers
      ansible.builtin.include_role:
        name: automation_runner
        tasks_from: timers
      vars:
        automation_runner_bootstrap_is_control_node: "{{ grayhaven_is_control_node | bool }}"
      when: grayhaven_role == "bastion"

    - name: Remove consumed bootstrap variables
      ansible.builtin.file:
        path: /etc/grayhaven/bootstrap/bootstrap-vars.yml
        state: absent
      no_log: true

    - name: Trigger initial control bastion runner execution without blocking bootstrap
      ansible.builtin.command:
        cmd: systemctl start --no-block grayhaven-ansible-runner.service
      changed_when: true
      when:
        - grayhaven_role == "bastion"
        - grayhaven_is_control_node | bool
