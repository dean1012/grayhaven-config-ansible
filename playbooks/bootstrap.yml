---
- name: Bootstrap first-boot host access
  hosts: localhost
  vars:
    ansible_python_interpreter: "/usr/bin/python3"
  connection: local
  become: true

  tasks:
    # Validate the OpenTofu/cloud-init handoff before any persistent host
    # changes are made. Most values are no_log because bootstrap variables can
    # include deploy keys and vault material on bastion hosts.
    - name: Validate common bootstrap variables
      ansible.builtin.assert:
        that:
          - grayhaven_hostname is defined
          - grayhaven_hostname is string
          - grayhaven_hostname | trim | length > 0
          - grayhaven_role is defined
          - grayhaven_role is string
          - grayhaven_role in ["bastion", "web"]
          - grayhaven_environment is defined
          - grayhaven_environment is string
          - grayhaven_environment in ["staging", "prod"]
          - grayhaven_config_repo_ref is defined
          - grayhaven_config_repo_ref is string
          - grayhaven_config_repo_ref | trim | length > 0
          - grayhaven_ansible_deploy_public_key is defined
          - grayhaven_ansible_deploy_public_key is string
          - grayhaven_ansible_deploy_public_key | trim | length > 0
          - grayhaven_certificate_environment is defined
          - grayhaven_certificate_environment in ["staging", "production"]
          - grayhaven_tls_mode is defined
          - grayhaven_tls_mode in ["host", "load_balancer"]
        fail_msg: "Required common bootstrap variables were not provided correctly by the OpenTofu/cloud-init handoff."
        quiet: true
      no_log: true

    - name: Validate bastion bootstrap variables
      ansible.builtin.assert:
        that:
          - grayhaven_is_control_node is defined
          - grayhaven_is_control_node is boolean
          - grayhaven_control_bastion_key is defined
          - grayhaven_control_bastion_key is string
          - grayhaven_control_bastion_key | trim | length > 0
          - grayhaven_vault_repo_url is defined
          - grayhaven_vault_repo_url is string
          - grayhaven_vault_repo_url | trim | length > 0
          - grayhaven_vault_repo_ref is defined
          - grayhaven_vault_repo_ref is string
          - grayhaven_vault_repo_ref | trim | length > 0
          - grayhaven_vault_password is defined
          - grayhaven_vault_password is string
          - grayhaven_vault_password | length > 0
          - grayhaven_ansible_deploy_private_key is defined
          - grayhaven_ansible_deploy_private_key is string
          - grayhaven_ansible_deploy_private_key | trim | length > 0
        fail_msg: "Required bastion bootstrap variables were not provided correctly by the OpenTofu/cloud-init handoff."
        quiet: true
      no_log: true
      when: grayhaven_role == "bastion"

    # First boot needs enough local baseline state to let the full runner take
    # over reliably, even on small droplets.
    - name: Set system hostname
      ansible.builtin.hostname:
        name: "{{ grayhaven_hostname }}"

    - name: Check active swap devices
      ansible.builtin.command:
        cmd: swapon --show=NAME --noheadings
      register: grayhaven_bootstrap_active_swap
      changed_when: false

    - name: Create bootstrap swapfile
      ansible.builtin.command:
        cmd: fallocate -l 1G /swapfile
        creates: /swapfile

    - name: Secure bootstrap swapfile permissions
      ansible.builtin.file:
        path: /swapfile
        owner: root
        group: root
        mode: "0600"

    - name: Format bootstrap swapfile
      ansible.builtin.command:
        cmd: mkswap /swapfile
      when: "'/swapfile' not in grayhaven_bootstrap_active_swap.stdout_lines"

    - name: Enable bootstrap swapfile
      ansible.builtin.command:
        cmd: swapon /swapfile
      when: "'/swapfile' not in grayhaven_bootstrap_active_swap.stdout_lines"

    - name: Persist bootstrap swapfile
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^/swapfile\s+'
        line: /swapfile none swap sw 0 0
        state: present

    - name: Create ansible automation user
      ansible.builtin.user:
        name: ansible
        comment: Grayhaven Systems LLC automation user
        create_home: true
        shell: /bin/bash
        password_lock: true
        state: present

    - name: Grant ansible passwordless sudo
      ansible.builtin.copy:
        dest: /etc/sudoers.d/ansible
        owner: root
        group: root
        mode: "0440"
        content: |
          ansible ALL=(ALL) NOPASSWD: ALL
        validate: /usr/sbin/visudo -cf %s

    - name: Create ansible SSH directory
      ansible.builtin.file:
        path: /home/ansible/.ssh
        state: directory
        owner: ansible
        group: ansible
        mode: "0700"

    - name: Install Ansible authorized key
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/authorized_keys
        owner: ansible
        group: ansible
        mode: "0600"
        content: "{{ grayhaven_ansible_deploy_public_key | trim }}\n"

    - name: Install Ansible control and vault deploy private key on bastion hosts
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/id_ed25519
        owner: ansible
        group: ansible
        mode: "0600"
        content: "{{ grayhaven_ansible_deploy_private_key | trim }}\n"
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Install Ansible control and vault deploy public key on bastion hosts
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/id_ed25519.pub
        owner: ansible
        group: ansible
        mode: "0644"
        content: "{{ grayhaven_ansible_deploy_public_key | trim }}\n"
      when: grayhaven_role == "bastion"

    - name: Create Grayhaven secrets directory
      ansible.builtin.file:
        path: /etc/grayhaven/ansible/secrets
        state: directory
        owner: root
        group: ansible
        mode: "0750"

    - name: Store Ansible Vault password on bastion hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/vault-password
        owner: root
        group: ansible
        mode: "0640"
        content: "{{ grayhaven_vault_password }}"
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Stop and disable DigitalOcean Droplet agent
      ansible.builtin.service:
        name: droplet-agent
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove DigitalOcean Droplet agent package
      ansible.builtin.dnf:
        name: droplet-agent
        state: absent

    - name: Remove DigitalOcean Droplet agent configuration directory
      ansible.builtin.file:
        path: /etc/droplet-agent
        state: absent

    - name: Remove DigitalOcean Droplet agent log directory
      ansible.builtin.file:
        path: /var/log/droplet-agent
        state: absent

    # Bastions keep the bootstrap deployment key and vault password because
    # they run full convergence. Web hosts receive only the public automation
    # key.
    - name: Install bastion runner OS dependencies
      ansible.builtin.dnf:
        name:
          - git
          - python3-pip
        state: present
      when: grayhaven_role == "bastion"

    - name: Store bastion runner environment
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/runner.env
        owner: root
        group: ansible
        mode: "0640"
        content: |
          REPO_URL={{ "https://github.com/dean1012/grayhaven-config-ansible.git" | quote }}
          REPO_REF={{ grayhaven_config_repo_ref | quote }}
          CHECKOUT_DIR={{ "/home/ansible/grayhaven-config-ansible" | quote }}
          VAULT_REPO_URL={{ grayhaven_vault_repo_url | quote }}
          VAULT_REPO_REF={{ grayhaven_vault_repo_ref | quote }}
          VAULT_CHECKOUT_DIR={{ "/home/ansible/grayhaven-vault" | quote }}
          GRAYHAVEN_ENVIRONMENT={{ grayhaven_environment | quote }}
          GRAYHAVEN_HOSTNAME={{ grayhaven_hostname | quote }}
          GRAYHAVEN_IS_CONTROL_NODE={{ (grayhaven_is_control_node | bool) | ternary("true", "false") | quote }}
          GRAYHAVEN_CERTIFICATE_ENVIRONMENT={{ grayhaven_certificate_environment | quote }}
          GRAYHAVEN_TLS_MODE={{ grayhaven_tls_mode | quote }}
      when: grayhaven_role == "bastion"

    - name: Install bastion runner executable
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/grayhaven-ansible-runner"
        dest: /usr/local/sbin/grayhaven-ansible-runner
        owner: root
        group: root
        mode: "0755"
      when: grayhaven_role == "bastion"

    - name: Install bastion runner service unit
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/systemd/grayhaven-ansible-runner.service"
        dest: /etc/systemd/system/grayhaven-ansible-runner.service
        owner: root
        group: root
        mode: "0644"
      when: grayhaven_role == "bastion"

    - name: Install bastion runner timer unit
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/systemd/grayhaven-ansible-runner.timer"
        dest: /etc/systemd/system/grayhaven-ansible-runner.timer
        owner: root
        group: root
        mode: "0644"
      when: grayhaven_role == "bastion"

    - name: Install bastion poller executable
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/grayhaven-ansible-poller"
        dest: /usr/local/sbin/grayhaven-ansible-poller
        owner: root
        group: root
        mode: "0755"
      when: grayhaven_role == "bastion"

    - name: Install bastion poller service unit
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/systemd/grayhaven-ansible-poller.service"
        dest: /etc/systemd/system/grayhaven-ansible-poller.service
        owner: root
        group: root
        mode: "0644"
      when: grayhaven_role == "bastion"

    - name: Install bastion poller timer unit
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/systemd/grayhaven-ansible-poller.timer"
        dest: /etc/systemd/system/grayhaven-ansible-poller.timer
        owner: root
        group: root
        mode: "0644"
      when: grayhaven_role == "bastion"

    - name: Manage bastion runner timer
      ansible.builtin.systemd_service:
        name: grayhaven-ansible-runner.timer
        enabled: "{{ grayhaven_is_control_node | bool }}"
        state: "{{ (grayhaven_is_control_node | bool) | ternary('started', 'stopped') }}"
        daemon_reload: true
      when: grayhaven_role == "bastion"

    - name: Manage bastion poller timer
      ansible.builtin.systemd_service:
        name: grayhaven-ansible-poller.timer
        enabled: "{{ grayhaven_is_control_node | bool }}"
        state: "{{ (grayhaven_is_control_node | bool) | ternary('started', 'stopped') }}"
        daemon_reload: true
      when: grayhaven_role == "bastion"

    - name: Trigger initial control bastion runner execution without blocking bootstrap
      ansible.builtin.command:
        cmd: systemctl start --no-block grayhaven-ansible-runner.service
      changed_when: true
      when:
        - grayhaven_role == "bastion"
        - grayhaven_is_control_node | bool
