---
- name: Bootstrap first-boot host access
  hosts: localhost
  vars:
    ansible_python_interpreter: "/usr/bin/python3"
  connection: local
  become: true

  tasks:
    - name: Set system hostname
      ansible.builtin.hostname:
        name: "{{ grayhaven_hostname }}"

    - name: Create ansible automation user
      ansible.builtin.user:
        name: ansible
        comment: Grayhaven Systems LLC automation user
        create_home: true
        shell: /bin/bash
        password_lock: true
        state: present

    - name: Grant ansible passwordless sudo
      ansible.builtin.copy:
        dest: /etc/sudoers.d/ansible
        owner: root
        group: root
        mode: "0440"
        content: |
          ansible ALL=(ALL) NOPASSWD: ALL
        validate: /usr/sbin/visudo -cf %s

    - name: Create ansible SSH directory
      ansible.builtin.file:
        path: /home/ansible/.ssh
        state: directory
        owner: ansible
        group: ansible
        mode: "0700"

    - name: Install Ansible control public key on web hosts
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/authorized_keys
        owner: ansible
        group: ansible
        mode: "0600"
        content: "{{ grayhaven_ansible_control_public_key }}\n"
      when: grayhaven_role == "web"

    - name: Install Ansible control private key on bastion hosts
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/id_ed25519
        owner: ansible
        group: ansible
        mode: "0600"
        content: "{{ grayhaven_ansible_control_private_key }}\n"
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Create Grayhaven secrets directory
      ansible.builtin.file:
        path: /etc/grayhaven/ansible/secrets
        state: directory
        owner: root
        group: ansible
        mode: "0750"

    - name: Store Discord webhook environment file on bastion hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/discord-webhook.env
        owner: root
        group: ansible
        mode: "0640"
        content: |
          DISCORD_WEBHOOK_URL="{{ grayhaven_discord_webhook_url }}"
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Store DigitalOcean inventory API token on bastion hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/do-api-token.env
        owner: root
        group: ansible
        mode: "0640"
        content: |
          DO_API_TOKEN="{{ grayhaven_digitalocean_inventory_api_token }}"
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Store dev HTTP basic auth htpasswd entry on web hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/dev-basic-auth-htpasswd
        owner: root
        group: root
        mode: "0600"
        content: "{{ grayhaven_dev_basic_auth_htpasswd_line }}\n"
      when: grayhaven_role == "web"
      no_log: true

    - name: Store DigitalOcean DNS API token on web hosts
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/digitalocean-dns-api-token
        owner: root
        group: root
        mode: "0600"
        content: "{{ grayhaven_digitalocean_dns_api_token }}\n"
      when: grayhaven_role == "web"
      no_log: true

    - name: Set root password hash
      ansible.builtin.user:
        name: root
        password: "{{ grayhaven_root_password_hash }}"
      no_log: true

    - name: Remove root authorized SSH keys
      ansible.builtin.file:
        path: /root/.ssh/authorized_keys
        state: absent

    - name: Stop and disable DigitalOcean Droplet agent
      ansible.builtin.service:
        name: droplet-agent
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove DigitalOcean Droplet agent package
      ansible.builtin.dnf:
        name: droplet-agent
        state: absent

    - name: Remove DigitalOcean Droplet agent configuration directory
      ansible.builtin.file:
        path: /etc/droplet-agent
        state: absent

    - name: Remove DigitalOcean Droplet agent log directory
      ansible.builtin.file:
        path: /var/log/droplet-agent
        state: absent

    - name: Remove bootstrap handoff directory
      ansible.builtin.file:
        path: /etc/grayhaven/bootstrap
        state: absent
