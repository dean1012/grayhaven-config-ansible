---
- name: Rotate Ansible control key from vault values
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Validate vault control key values
      ansible.builtin.assert:
        that:
          - ansible_control_public_key is defined
          - ansible_control_public_key is string
          - ansible_control_public_key | trim | length > 0
          - ansible_control_private_key is defined
          - ansible_control_private_key is string
          - ansible_control_private_key | trim | length > 0
        fail_msg: "ansible_control_public_key and ansible_control_private_key must be loaded from the vault."
        quiet: true
      no_log: true

    - name: Authorize vault control key for ansible user
      ansible.posix.authorized_key:
        user: ansible
        key: "{{ ansible_control_public_key | trim }}"
        state: present
      no_log: true

    - name: Install vault control private key on bastions
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/id_ed25519
        owner: ansible
        group: ansible
        mode: "0600"
        content: "{{ ansible_control_private_key | trim }}\n"
      when: grayhaven_role == "bastion"
      no_log: true

    - name: Install vault control public key on bastions
      ansible.builtin.copy:
        dest: /home/ansible/.ssh/id_ed25519.pub
        owner: ansible
        group: ansible
        mode: "0644"
        content: "{{ ansible_control_public_key | trim }}\n"
      when: grayhaven_role == "bastion"
      no_log: true
