---
- name: Validate the synthetic Time Tracker deployment contract
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    deploy_websites_certbot_email: operator@example.invalid
    timetracker:
      hostname: timetracker.example.invalid
      image_digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      branding_commit: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
      data_dir: /var/lib/grayhaven/timetracker/data
      branding_dir: /var/lib/grayhaven/timetracker/branding
      secrets_dir: /var/lib/grayhaven/timetracker/secrets
      backup_dir: /var/lib/grayhaven/timetracker/backups
      backup_retention_days: 14
    timetracker_secrets:
      flask_secret_key: example_flask_secret_key_replace_with_at_least_32_characters
      sqlcipher_passphrase: example_sqlcipher_passphrase_replace_with_32_characters
      initial_users:
        - email: operator@example.invalid
          first_name: Example
          last_name: Operator
          password_hash: >-
            $argon2id$v=19$m=65536,t=3,p=4$ZXhhbXBsZS1zYWx0LTAwMDA$tCxgdoL3XKaX1D3RkSeXTMM4zlSl+JB+AGLiY0oSB5U
          admin: true

  tasks:
    - name: Run Time Tracker input validation without host mutation
      ansible.builtin.include_role:
        name: timetracker
        tasks_from: validate
