---
- name: Rotate persisted Ansible Vault password on bastions
  hosts: tag_role_bastion
  become: true
  gather_facts: false

  tasks:
    - name: Validate new vault password input
      ansible.builtin.assert:
        that:
          - new_vault_password is defined
          - new_vault_password is string
          - new_vault_password | length > 0
        fail_msg: "Pass new_vault_password through a temporary vars file."
        quiet: true
      no_log: true

    - name: Update persisted Ansible Vault password
      ansible.builtin.copy:
        dest: /etc/grayhaven/ansible/secrets/vault-password
        owner: root
        group: ansible
        mode: "0640"
        content: "{{ new_vault_password }}"
      no_log: true
